<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29" />
      <stop offset="50%" stop-color="#302b63" />
      <stop offset="100%" stop-color="#24243e" />
    </linearGradient>
    
    <!-- Accent Gradient for QR elements -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5a5ff" />
      <stop offset="100%" stop-color="#6a5acd" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Ring -->
  <rect x="36" y="36" width="440" height="440" rx="90" fill="none" stroke="url(#accentGrad)" stroke-width="6" opacity="0.4" filter="url(#glow)" />

  <!-- QR Outer Finder Patterns -->
  <!-- Top Left Finder -->
  <rect x="100" y="100" width="100" height="100" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="18" />
  <rect x="132" y="132" width="36" height="36" rx="8" fill="#ffffff" />
  
  <!-- Top Right Finder -->
  <rect x="312" y="100" width="100" height="100" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="18" />
  <rect x="344" y="132" width="36" height="36" rx="8" fill="#ffffff" />
  
  <!-- Bottom Left Finder -->
  <rect x="100" y="312" width="100" height="100" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="18" />
  <rect x="132" y="344" width="36" height="36" rx="8" fill="#ffffff" />

  <!-- Center scanner line effect (native vibe) -->
  <line x1="70" y1="256" x2="442" y2="256" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" filter="url(#glow)" />
  
  <!-- QR Modules / Bits (Decorative) -->
  <!-- Bottom Right Module Groups -->
  <rect x="312" y="312" width="32" height="32" rx="6" fill="url(#accentGrad)" />
  <rect x="380" y="312" width="32" height="32" rx="6" fill="#ffffff" />
  <rect x="312" y="380" width="32" height="32" rx="6" fill="#ffffff" />
  <rect x="380" y="380" width="32" height="32" rx="6" fill="url(#accentGrad)" opacity="0.9" />
  
  <rect x="348" y="348" width="32" height="32" rx="6" fill="url(#accentGrad)" />
  <rect x="416" y="348" width="32" height="32" rx="6" fill="#ffffff" />
  <rect x="348" y="416" width="32" height="32" rx="6" fill="#ffffff" />
  
  <!-- Random bits -->
  <rect x="236" y="132" width="40" height="40" rx="8" fill="url(#accentGrad)" opacity="0.7" />
  <rect x="236" y="344" width="40" height="40" rx="8" fill="url(#accentGrad)" opacity="0.7" />
  <rect x="132" y="236" width="40" height="40" rx="8" fill="url(#accentGrad)" opacity="0.7" />
  <rect x="344" y="236" width="40" height="40" rx="8" fill="url(#accentGrad)" opacity="0.7" />
</svg>
