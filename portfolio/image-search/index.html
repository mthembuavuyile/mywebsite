<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals - Multi-Provider Image Search</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <meta property="og:url" content="https://vylex.co.za/portfolio/image-search/">

</head>

<body>

    <header>
        <h1><i class="fas fa-images"></i> Visuals</h1>
        <p>A premium multi-provider image search engine. Get mixed results from across the web instantly.</p>
    </header>

    <div class="search-wrapper">
        <form class="search-container" id="search-form">
            <input type="text" id="search-input" placeholder="Search for anything..." required autocomplete="off">
            <button type="button" class="clear-search" id="clear-search">&times;</button>
            <button type="submit">Search</button>
        </form>
        <div class="tags-container" id="tags">
            <span class="tag">Cyberpunk</span>
            <span class="tag">Nature</span>
            <span class="tag">Architecture</span>
        </div>
    </div>

    <div id="status"></div>
    <div id="stats" class="stats-bar"></div>
    <div id="gallery"></div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <button class="close-lightbox" id="close-lightbox">&times;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-info">
                <h3 id="lightbox-title" class="lightbox-title"></h3>
                <div class="lightbox-actions">
                    <a id="lightbox-source" href="#" target="_blank" class="btn-source">View Original Source</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
