<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nexora – Live Data Assistant</title>
  <meta name="description" content="Nexora fetches live weather, crypto prices, news, dictionary definitions, and more — all from a single chat interface.">
  <meta name="keywords" content="weather, crypto prices, live news, dictionary, reddit, assistant, data fetcher">
  <meta name="author" content="Vylex">

  <!-- Open Graph -->
  <meta property="og:title" content="Nexora – Live Data Assistant">
  <meta property="og:description" content="Ask about weather, crypto, news, definitions and more. Nexora pulls live data so you don't have to.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body data-theme="light">

  <header class="header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
      Nexora AI
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clear-btn" title="New Chat" aria-label="New Chat">
        <i class="fas fa-pen-to-square"></i>
      </button>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
        <i class="fas fa-cog"></i>
      </button>
    </div>
  </header>

  <div class="app-body">
    <div id="chat" role="log" aria-live="polite" aria-label="Chat messages">
      <div id="welcome-screen">
        <div class="welcome-orb"><i class="fas fa-layer-group"></i></div>
        <h2>How can I help you?</h2>
        <p>Ask me about weather, crypto prices, word definitions, Bible verses, Reddit posts, jokes, advice, or show
          images.</p>
        <div class="suggestions-grid">
          <button class="suggestion-card" onclick="sendSuggestion('Weather in London')">
            <span class="sug-icon">🌤️</span>
            <div class="sug-title">Weather</div>
            <div class="sug-sub">Check any city</div>
          </button>

          <button class="suggestion-card" onclick="sendSuggestion('What is the derivative of x^2 + 2x?')">
            <span class="sug-icon">🧮</span>
            <div class="sug-title">Math Solver</div>
            <div class="sug-sub">Solve & Derive</div>
          </button>

          <button class="suggestion-card" onclick="sendSuggestion('Show me the latest news')">
            <span class="sug-icon">📰</span>
            <div class="sug-title">News</div>
            <div class="sug-sub">Top headlines</div>
          </button>

          <button class="suggestion-card" onclick="sendSuggestion('Bitcoin price right now')">
            <span class="sug-icon">₿</span>
            <div class="sug-title">Crypto</div>
            <div class="sug-sub">Live prices</div>
          </button>

          <button class="suggestion-card" onclick="sendSuggestion('Show me an image of a camera')">
            <span class="sug-icon">📸</span>
            <div class="sug-title">Images</div>
            <div class="sug-sub">Generate pictures</div>
          </button>
          
          <button class="suggestion-card" onclick="sendSuggestion('Define serendipity')">
            <span class="sug-icon">📖</span>
            <div class="sug-title">Dictionary</div>
            <div class="sug-sub">Word meanings</div>
          </button>
        </div>
      </div>
    </div>

    <button id="scroll-btn" aria-label="Scroll to bottom">
      <i class="fas fa-arrow-down"></i>
    </button>

    <div class="input-zone">
      <form id="form" autocomplete="off">
        <div class="input-row">
          <input type="text" id="input" placeholder="Message Nexora…" aria-label="Message input">
          <div class="input-actions">
            <button type="button" id="mic-btn" aria-label="Voice input">
              <i class="fas fa-microphone"></i>
            </button>
            <button type="submit" id="send-btn" aria-label="Send">
              <i class="fas fa-arrow-up"></i>
            </button>
          </div>
        </div>
      </form>
      <div class="footer-note">Nexora can make mistakes <a href="about.html">learn more</a></div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="backdrop"></div>
  <aside id="settings-panel" aria-label="Settings">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="close-settings" aria-label="Close settings">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="settings-body">
      <div class="s-section">
        <h3>Appearance</h3>
        <div class="theme-row">
          <button class="theme-opt active" data-theme="light"><i class="fas fa-sun"></i> Light</button>
          <button class="theme-opt" data-theme="dark"><i class="fas fa-moon"></i> Dark</button>
        </div>
      </div>
      <div class="s-section">
        <h3>Voice & Speech</h3>
        <label class="s-check">
          <input type="checkbox" id="tts-enabled"> Read responses aloud
        </label>
        <br>
        <label class="s-label" for="voice-select">Voice</label>
        <select class="s-select" id="voice-select"></select>
        <label class="s-label">Speed: <span id="rate-val">1.0</span></label>
        <input type="range" class="s-range" id="voice-rate" min="0.5" max="2" step="0.1" value="1.0">
        <label class="s-label">Pitch: <span id="pitch-val">1.0</span></label>
        <input type="range" class="s-range" id="voice-pitch" min="0.5" max="2" step="0.1" value="1.0">
      </div>
      <div class="s-section">
        <h3>Preferences</h3>
        <label class="s-label" for="weather-units">Weather Units</label>
        <select class="s-select" id="weather-units">
          <option value="metric">Celsius (°C)</option>
          <option value="imperial">Fahrenheit (°F)</option>
        </select>
      </div>
      <div class="s-section">
        <button class="btn-danger" id="reset-settings">
          <i class="fas fa-trash-alt"></i> Reset All Settings
        </button>
      </div>
    </div>
  </aside>

  <!-- Modular Scripts Architecture -->
  <!-- 1. Core Registry First -->
  <script src="js/registry.js"></script>
  <!-- 2. Independent API Modules -->
  <script src="js/api/weather.js"></script>
  <script src="js/api/crypto.js"></script>
  <script src="js/api/dictionary.js"></script>
  <script src="js/api/jokes.js"></script>
  <script src="js/api/reddit.js"></script>
  <script src="js/api/bible.js"></script>
  <script src="js/api/advice.js"></script>
  <script src="js/api/ocr.js"></script>
  <script src="js/api/image.js"></script>
  <script src="js/api/currency.js"></script>
  <script src="js/api/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- 3. Core App Controller Last -->
  <script src="js/app.js"></script>
</body>

</html>
