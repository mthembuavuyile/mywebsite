<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Certificate Studio - Vylex</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.15/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com/3.3.5"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="canonical" href="https://vylex.co.za/portfolio/certificate-generator/">
    <meta name="robots" content="index, follow" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Pacifico&family=Satisfy&family=Caveat:wght@400;700&family=Kaushan+Script&family=Lobster&family=Amatic+SC:wght@400;700&display=swap');

        :root {
            --primary: #4F46E5;
            --secondary: #7C3AED;
            --accent: #EC4899;
            --success: #22C55E;
            --warning: #F59E0B;
            --error: #EF4444;
            --background: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-150px) rotate(360deg);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .certificate-preview {
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .certificate-preview::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(79, 70, 229, 0.1) 50%, transparent 60%);
            transform: rotate(45deg);
            transform-origin: center;
        }

        .signature-canvas {
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            background: white;
            cursor: crosshair;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .animate-pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        .trust-indicators {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
        }

        .trust-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 80px;
            font-size: 0.75rem;
            color: #4B5563;
        }

        .trust-icon {
            width: 24px;
            height: 24px;
            color: #4F46E5;
            margin-bottom: 0.5rem;
            stroke-width: 2;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="floating-shapes">
        <div class="shape" style="width: 100px; height: 100px; top: 15%; left: 5%; animation-delay: 0s;"></div>
        <div class="shape" style="width: 150px; height: 150px; top: 25%; right: 10%; animation-delay: 2s;"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { jsPDF } = window.jspdf;

        // --- Data constants (unchanged) ---
        const templates = {
            graduation: { title: "Certificate of Graduation", icon: "🎓", defaultCourse: "Grade 12 / Matric", description: "has successfully completed all academic requirements and is hereby awarded this certificate in recognition of their graduation from" },
            achievement: { title: "Certificate of Achievement", icon: "🏆", defaultCourse: "Academic Excellence", description: "is hereby recognized for outstanding achievement and exceptional performance in" },
            participation: { title: "Certificate of Participation", icon: "⭐", defaultCourse: "Community Event", description: "has actively participated in and contributed to the success of" },
            church: { title: "Church Certificate", icon: "⛪", defaultCourse: "Church Ministry", description: "is hereby certified for faithful participation and spiritual growth in" },
            internship: { title: "Certificate of Internship Completion", icon: "💼", defaultCourse: "Professional Development Program", description: "has successfully completed the internship program and demonstrated professional competency in" },
            volunteer: { title: "Certificate of Volunteer Service", icon: "🤝", defaultCourse: "Community Service", description: "has provided valuable volunteer service and made significant contributions to" },
        };
        const colorThemes = {
            classic: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#EC4899' },
            elegant: { primary: '#1F2937', secondary: '#374151', accent: '#6B7280' },
            modern: { primary: '#DC2626', secondary: '#EA580C', accent: '#FBBF24' },
            nature: { primary: '#16A34A', secondary: '#22C55E', accent: '#EAB308' },
        };

        const CONFIG = {
            PAYFAST_MERCHANT_ID: "22972809",
            PAYFAST_MERCHANT_KEY: "p9ahdpi1eppwj",
            AMOUNT_ZAR: "5.00",
            AMOUNT_USD: "0.30",
            ITEM_NAME: "Donation to Elite Certificate Studio"
        };

        const DonationPage = () => {
            const [customerData, setCustomerData] = useState({
                name: '',
                email: ''
            });

            return (
                <div className="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col w-full animate-fade-in">
                    <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-center text-white">
                        <h3 className="text-2xl font-bold">Support the Developer</h3>
                        <p className="text-indigo-100 text-sm mt-1">Optional Donation</p>
                    </div>

                    <div className="p-6 md:p-8">
                        {/* Trust Indicators (Unchanged) */}
                        <div className="trust-indicators">
                            <div className="trust-item">
                                <svg className="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                <span>256-bit<br />Secure</span>
                            </div>
                            <div className="trust-item">
                                <svg className="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                <span>Instant<br />Delivery</span>
                            </div>
                            <div className="trust-item">
                                <svg className="trust-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span>Verified<br />Gateway</span>
                            </div>
                        </div>

                        <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl mb-6 flex justify-between items-center">
                            <span className="font-semibold text-indigo-900">Suggested Donation:</span>
                            <div className="text-right">
                                <span className="font-bold text-2xl text-indigo-600">R {CONFIG.AMOUNT_ZAR}</span>
                                <div className="text-xs text-indigo-400">or ${CONFIG.AMOUNT_USD} USD</div>
                            </div>
                        </div>

                        <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Full Name (optional)</label>
                                <input type="text"
                                    className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow"
                                    placeholder="John Doe"
                                    value={customerData.name}
                                    onChange={e => setCustomerData({ ...customerData, name: e.target.value })} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Email Address (optional)</label>
                                <input type="email"
                                    className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow"
                                    placeholder="john@example.com"
                                    value={customerData.email}
                                    onChange={e => setCustomerData({ ...customerData, email: e.target.value })} />
                            </div>
                        </div>

                        <div className="space-y-4">
                            {/* PayFast Form - Fixed to use state bindings instead of DOM selectors */}
                            <form action="https://www.payfast.co.za/eng/process" method="post" target="_blank" onSubmit={(e) => {
                                // Set the dynamic ID directly on the form element before native submission
                                e.target.elements.m_payment_id.value = `ORDER_${Date.now()}`;
                            }}>
                                <input type="hidden" name="merchant_id" value={CONFIG.PAYFAST_MERCHANT_ID} />
                                <input type="hidden" name="merchant_key" value={CONFIG.PAYFAST_MERCHANT_KEY} />
                                <input type="hidden" name="item_name" value={CONFIG.ITEM_NAME} />
                                <input type="hidden" name="amount" value={CONFIG.AMOUNT_ZAR} />

                                {/* Bind values directly to React state */}
                                <input type="hidden" name="name_first" value={customerData.name.split(' ')[0] || ''} />
                                <input type="hidden" name="name_last" value={customerData.name.split(' ').slice(1).join(' ') || ''} />
                                <input type="hidden" name="email_address" value={customerData.email || ''} />
                                <input type="hidden" name="m_payment_id" defaultValue="" />

                                <button type="submit" className="w-full bg-[#e52129] hover:bg-[#c91d24] text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
                                    Donate with PayFast
                                </button>
                            </form>

                            <div className="relative text-center border-t border-gray-200 mt-6 mb-4">
                                <span className="bg-white px-3 text-sm font-medium text-gray-400 relative -top-3">OR</span>
                            </div>

                            {/* PayPal Button - Fixed to use the standard NCP link */}
                            <div>
                                <a href="https://www.paypal.com/ncp/payment/5F8MPDR63RHFJ"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
                                    Donate with PayPal
                                </a>
                            </div>
                        </div>

                        <p className="text-xs text-center text-gray-500 mt-6 bg-gray-50 p-3 rounded-lg flex items-center justify-center gap-2">
                            <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            Protected by bank-level encryption. We do not store your card details.
                        </p>
                    </div>
                </div>
            );
        };

        const CertificateGenerator = () => {
            // --- STATE MANAGEMENT ---
            const [activeTab, setActiveTab] = useState('template');
            const [selectedTemplate, setSelectedTemplate] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState('classic');
            const [formData, setFormData] = useState({
                recipientName: '', certificateTitle: '', description: '', organizationName: '', courseName: '', issuerName: '', certificateDate: new Date().toISOString().split('T')[0], certificateNumber: '', grade: '',
            });
            const [signatureType, setSignatureType] = useState('draw');
            const [signatureFont, setSignatureFont] = useState('Dancing Script');
            const [signatureImage, setSignatureImage] = useState(null);
            const [typedSignature, setTypedSignature] = useState('');
            const [stats, setStats] = useState({ generated: 0 });
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            // --- NEW STATE FOR DONATION ---
            const [showDonationModal, setShowDonationModal] = useState(false);

            const canvasRef = useRef(null);
            const [signaturePad, setSignaturePad] = useState(null);

            // --- HOOKS ---
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(255,255,255,0)', penColor: '#000000', minWidth: 1, maxWidth: 3 });
                    setSignaturePad(pad);
                    return () => pad.clear();
                }
            }, []);

            // --- LOAD STATS ONLY (REMOVED PAYMENT CHECK) ---
            useEffect(() => {
                // Load stats
                const savedStats = JSON.parse(localStorage.getItem('certStats') || '{"generated": 0}');
                setStats(savedStats);
            }, []);

            // --- HELPER FUNCTIONS ---
            const showToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
            };

            const handleInputChange = (e) => {
                const { id, value } = e.target;
                setFormData({ ...formData, [id]: value });
            };

            const selectTemplate = (template) => {
                setSelectedTemplate(template);
                setFormData({ ...formData, certificateTitle: templates[template].title, description: templates[template].description, courseName: templates[template].defaultCourse });
                showToast(`${templates[template].icon} ${templates[template].title} selected!`, 'success');
                setTimeout(() => setActiveTab('customize'), 1000);
            };

            const selectTheme = (theme) => {
                setSelectedTheme(theme);
                const { primary, secondary, accent } = colorThemes[theme];
                document.documentElement.style.setProperty('--primary', primary);
                document.documentElement.style.setProperty('--secondary', secondary);
                document.documentElement.style.setProperty('--accent', accent);
                localStorage.setItem('selectedTheme', theme);
                showToast('Theme updated!', 'success');
            };

            const generatePDF = async () => {
                if (!selectedTemplate || !formData.recipientName) {
                    showToast('Please select a template and enter recipient name!', 'error');
                    setActiveTab('template');
                    return;
                }

                const preview = document.getElementById('certificatePreview');
                const canvas = await html2canvas(preview, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const imgWidth = pageWidth - 20;
                const imgHeight = (pageHeight - 20) > ((imgWidth * canvas.height) / canvas.width) ? ((imgWidth * canvas.height) / canvas.width) : (pageHeight - 20);
                const x = (pageWidth - imgWidth) / 2;
                const y = (pageHeight - imgHeight) / 2;

                doc.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
                doc.save(`${formData.recipientName.replace(/\s+/g, '_')}_Certificate.pdf`);

                setStats((prev) => {
                    const newStats = { ...prev, generated: prev.generated + 1 };
                    localStorage.setItem('certStats', JSON.stringify(newStats));
                    return newStats;
                });
                showToast('Certificate downloaded successfully!', 'success');
            };

            const renderTabContent = () => {
                switch (activeTab) {
                    case 'template':
                        return (
                            <div className="p-6 glass-card rounded-3xl">
                                <h2 className="text-2xl font-bold mb-6">1. Choose Your Template</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {Object.entries(templates).map(([key, { title, icon, description }]) => (
                                        <div key={key} className={`p-6 rounded-2xl bg-white shadow-lg hover:shadow-xl transition-all cursor-pointer ${selectedTemplate === key ? 'border-4 border-indigo-500' : 'border-2 border-gray-200'}`} onClick={() => selectTemplate(key)}>
                                            <div className="text-4xl mb-4">{icon}</div>
                                            <h3 className="text-xl font-semibold">{title}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case 'customize':
                        return (
                            <div className="p-6 glass-card rounded-3xl">
                                <h2 className="text-2xl font-bold mb-6">2. Customize Style</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="p-4 bg-white rounded-2xl shadow">
                                        <h3 className="text-lg font-semibold mb-4">Color Theme</h3>
                                        <div className="grid grid-cols-3 gap-4">
                                            {Object.keys(colorThemes).map((theme) => (
                                                <div key={theme} className={`h-16 rounded-xl cursor-pointer transition-transform hover:scale-105 ${selectedTheme === theme ? 'ring-4 ring-gray-900' : ''}`} style={{ background: `linear-gradient(45deg, ${colorThemes[theme].primary}, ${colorThemes[theme].secondary})` }} onClick={() => selectTheme(theme)}></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-4 bg-white rounded-2xl shadow">
                                        <h3 className="text-lg font-semibold mb-4">Font Style</h3>
                                        <select id="fontFamily" className="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" onChange={(e) => document.getElementById('certificatePreview').style.fontFamily = e.target.value}>
                                            <option value="Inter">Modern (Inter)</option>
                                            <option value="Times New Roman">Classic (Times)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'content':
                        return (
                            <div className="p-6 glass-card rounded-3xl">
                                <h2 className="text-2xl font-bold mb-6">3. Certificate Content</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {[
                                        { id: 'recipientName', label: 'Recipient Name *', type: 'text', required: true },
                                        { id: 'certificateTitle', label: 'Certificate Title *', type: 'text', required: true },
                                        { id: 'description', label: 'Description *', type: 'textarea', required: true },
                                        { id: 'organizationName', label: 'Organization Name', type: 'text' },
                                        { id: 'courseName', label: 'Course/Program Name', type: 'text' },
                                        { id: 'issuerName', label: 'Issued By', type: 'text' },
                                        { id: 'certificateDate', label: 'Certificate Date', type: 'date' },
                                        { id: 'certificateNumber', label: 'Certificate Number', type: 'text' },
                                        { id: 'grade', label: 'Grade/Score', type: 'text' },
                                    ].map(({ id, label, type, required }) => (
                                        <div key={id} className="flex flex-col">
                                            <label htmlFor={id} className="font-semibold mb-2">{label}</label>
                                            {type === 'textarea' ? (
                                                <textarea id={id} required={required} className="p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 h-32" value={formData[id]} onChange={handleInputChange} />
                                            ) : (
                                                <input id={id} type={type} required={required} className="p-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200" value={formData[id]} onChange={handleInputChange} />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case 'signature':
                        return (
                            <div className="p-6 glass-card rounded-3xl">
                                <h2 className="text-2xl font-bold mb-6">4. Digital Signature</h2>
                                <div className="flex gap-2 mb-4">
                                    {['draw', 'type', 'upload'].map((type) => (<button key={type} className={`px-4 py-2 rounded-lg ${signatureType === type ? 'bg-indigo-600 text-white' : 'bg-white border-2 border-gray-200'}`} onClick={() => setSignatureType(type)}>{type.charAt(0).toUpperCase() + type.slice(1)}</button>))}
                                </div>
                                {signatureType === 'draw' && (<div><canvas ref={canvasRef} className="signature-canvas w-full h-40 mb-4"></canvas><button className="px-4 py-2 bg-gray-500 text-white rounded-lg" onClick={() => signaturePad.clear()}>Clear</button></div>)}
                                {signatureType === 'type' && (<div><input type="text" className="w-full p-3 border-2 border-gray-200 rounded-lg mb-4" value={typedSignature} onChange={(e) => setTypedSignature(e.target.value)} placeholder="Type your signature" /><div className="p-4 bg-white rounded-lg text-2xl" style={{ fontFamily: `'${signatureFont}', cursive` }}>{typedSignature || 'Your signature preview'}</div></div>)}
                                {signatureType === 'upload' && (<div><input type="file" accept="image/*" className="mb-4" onChange={(e) => { const file = e.target.files[0]; if (file && file.size <= 2 * 1024 * 1024) { const reader = new FileReader(); reader.onload = (e) => setSignatureImage(e.target.result); reader.readAsDataURL(file); } else { showToast('File too large! Max 2MB.', 'error'); } }} />{signatureImage && (<img src={signatureImage} alt="Uploaded signature" className="max-w-48 max-h-16" />)}</div>)}
                            </div>
                        );
                    case 'preview':
                        return (
                            <div className="p-6 glass-card rounded-3xl">
                                <h2 className="text-2xl font-bold mb-6">5. Preview & Download</h2>

                                <div id="certificatePreview" className="certificate-preview p-12 bg-white rounded-3xl shadow-2xl max-w-4xl mx-auto" style={{ fontFamily: 'Inter' }}>
                                    <div className="border-4 border-indigo-500 rounded-lg p-8">
                                        <div className="text-center border-b-4 border-indigo-500 pb-6 mb-8">
                                            <h1 className="text-4xl font-bold text-indigo-600">{formData.certificateTitle || 'Certificate Title'}</h1>
                                            <p className="text-lg text-gray-600 italic">{formData.organizationName || 'Organization Name'}</p>
                                        </div>
                                        <div className="text-center space-y-6">
                                            <p className="text-lg">This is to certify that</p>
                                            <h2 className="text-3xl font-bold text-gray-900 underline decoration-indigo-500 decoration-2 underline-offset-8">
                                                {formData.recipientName || 'Recipient Name'}
                                            </h2>
                                            <p className="text-lg text-gray-700">{formData.description || 'Description goes here'}</p>
                                            {formData.courseName && <p className="text-lg text-gray-700">Course: {formData.courseName}</p>}
                                        </div>
                                        <div className="flex justify-between items-end mt-12 flex-wrap gap-6">
                                            <div className="text-center min-w-[200px]">
                                                {signatureType === 'draw' && signaturePad && !signaturePad.isEmpty() && (<img src={signaturePad.toDataURL()} alt="Signature" className="max-w-36 max-h-12 mb-2 mx-auto" />)}
                                                {signatureType === 'type' && typedSignature && (<div className="text-2xl mb-2" style={{ fontFamily: `'${signatureFont}', cursive` }}>{typedSignature}</div>)}
                                                {signatureType === 'upload' && signatureImage && (<img src={signatureImage} alt="Signature" className="max-w-36 max-h-12 mb-2 mx-auto" />)}
                                                <div className="border-t-2 border-gray-900 pt-2">
                                                    <p className="font-semibold">{formData.issuerName || 'Issuer Name'}</p>
                                                    <p className="text-sm">Authorized Signature</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="font-semibold text-indigo-600">{formData.certificateDate ? new Date(formData.certificateDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Date'}</p>
                                                {formData.certificateNumber && (<p className="text-sm text-gray-600">Cert. No: {formData.certificateNumber}</p>)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-4 justify-center mt-8">
                                    <button className="px-8 py-4 bg-green-500 text-white text-lg rounded-full hover:bg-green-600" onClick={generatePDF}>
                                        Download PDF
                                    </button>
                                    <button className="px-8 py-4 bg-blue-500 text-white text-lg rounded-full hover:bg-blue-600" onClick={() => setShowDonationModal(true)}>
                                        Support with Donation
                                    </button>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="container mx-auto p-4 max-w-7xl">
                    <div className="text-center mb-8 text-white">
                        <h1 className="text-4xl md:text-5xl font-bold mb-4">Elite Certificate Studio</h1>
                        <p className="text-lg md:text-xl opacity-90 max-w-2xl mx-auto">
                            Craft beautiful, professional certificates in minutes.
                        </p>
                    </div>

                    <div className="flex flex-wrap gap-2 mb-6 bg-gray-100 p-2 rounded-2xl">
                        {['template', 'customize', 'content', 'signature', 'preview'].map((tab) => (
                            <button key={tab} className={`flex-1 px-4 py-3 rounded-xl font-semibold transition-all ${activeTab === tab ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg' : 'bg-white text-gray-700'}`} onClick={() => setActiveTab(tab)}>
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </div>

                    {renderTabContent()}

                    <div className={`toast p-4 rounded-xl shadow-lg text-white ${toast.type === 'success' ? 'bg-green-500' : toast.type === 'error' ? 'bg-red-500' : 'bg-blue-500'} ${toast.show ? 'show' : ''}`}>
                        {toast.message}
                    </div>

                    {/* --- DONATION MODAL --- */}
                    <div
                        className={`modal ${showDonationModal ? 'show' : ''}`}
                        onClick={() => setShowDonationModal(false)}
                    >
                        <div
                            className="modal-content glass-card rounded-3xl p-8 max-w-md w-full relative"
                            onClick={(e) => e.stopPropagation()} // Prevents clicks inside the card from closing the modal
                        >
                            <button className="absolute top-4 right-4 z-10 text-gray-500 hover:text-gray-800 text-2xl" onClick={() => setShowDonationModal(false)}>×</button>
                            <DonationPage />
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CertificateGenerator />, document.getElementById('root'));
    </script>
</body>

</html>
