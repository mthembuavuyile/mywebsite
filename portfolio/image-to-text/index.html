<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Recognition (OCR) Tool | Vylex</title>
    <meta name="description"
        content="Free online text recognition (OCR) tool by Vylex. Extract text from images using your camera or upload.">
    <meta name="keywords" content="text recognition, OCR, image to text, mobile scanner, online reader, Vylex">
    <meta property="og:title" content="Text Recognition (OCR) Tool | Vylex">
    <meta property="og:description"
        content="Free online text recognition (OCR) tool by Vylex. Extract text from images using your camera or upload.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">

    <meta property="og:url" content="https://vylex.co.za/portfolio/image-to-text/index.html">


    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 35%, #334155 100%);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --text-tertiary: rgba(255, 255, 255, 0.65);
            --surface-primary: rgba(255, 255, 255, 0.1);
            --surface-secondary: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.15);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 20px;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition-fast: 0.15s ease;
            --transition-medium: 0.25s ease;
            --transition-slow: 0.35s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--primary-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px;
            line-height: 1.5;
            padding: var(--spacing-lg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .app-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .app-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            font-weight: 400;
        }

        .scanner-card {
            background: var(--surface-primary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: var(--border-radius-xl);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            margin-bottom: var(--spacing-lg);
        }

        .input-methods {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            background: var(--surface-secondary);
            border-radius: var(--border-radius-md);
            padding: var(--spacing-xs);
        }

        .input-tab {
            flex: 1;
            padding: var(--spacing-sm) var(--spacing-md);
            background: transparent;
            border: none;
            border-radius: var(--border-radius-sm);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
        }

        .input-tab.active {
            background: var(--accent-gradient);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .input-tab:hover:not(.active) {
            background: var(--surface-primary);
            color: var(--text-primary);
        }

        .input-content {
            display: none;
        }

        .input-content.active {
            display: block;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            background: #000;
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--border-radius-md);
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 25%, rgba(0, 0, 0, 0.4) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .scan-frame {
            width: 280px;
            height: 150px;
            border: 2px solid #6366f1;
            border-radius: var(--border-radius-md);
            position: relative;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .scan-frame::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 2px;
            animation: textScanLine 2s ease-in-out infinite;
        }

        .scan-corners {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .scan-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #6366f1;
        }

        .scan-corner.top-left {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: var(--border-radius-md);
        }

        .scan-corner.top-right {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: var(--border-radius-md);
        }

        .scan-corner.bottom-left {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: var(--border-radius-md);
        }

        .scan-corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: var(--border-radius-md);
        }

        @keyframes textScanLine {

            0%,
            100% {
                left: 0;
                opacity: 1;
            }

            50% {
                left: 80%;
                opacity: 0.8;
            }
        }

        .upload-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .file-upload-area {
            position: relative;
            border: 2px dashed var(--surface-border);
            border-radius: var(--border-radius-md);
            padding: var(--spacing-xl);
            text-align: center;
            background: var(--surface-secondary);
            transition: all var(--transition-medium);
            cursor: pointer;
        }

        .file-upload-area:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: var(--surface-primary);
        }

        .file-upload-area.dragover {
            border-color: var(--success-color);
            background: rgba(16, 185, 129, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto var(--spacing-md);
            color: var(--text-secondary);
        }

        .upload-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .upload-subtext {
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }

        #fileInput {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .image-preview {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            display: none;
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .remove-image {
            position: absolute;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .remove-image:hover {
            background: var(--error-color);
            transform: scale(1.1);
        }

        .capture-controls {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .capture-btn {
            flex: 1;
            padding: var(--spacing-md);
            background: var(--surface-primary);
            border: 1px solid var(--surface-border);
            border-radius: var(--border-radius-md);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .capture-btn:hover:not(:disabled) {
            background: var(--surface-secondary);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .capture-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .capture-btn.primary {
            background: var(--accent-gradient);
            border-color: transparent;
        }

        .result-section {
            background: var(--surface-secondary);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius-md);
            padding: var(--spacing-md);
            transition: all var(--transition-medium);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .result-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .result-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-actions {
            margin-left: auto;
            display: flex;
            gap: var(--spacing-xs);
        }

        .action-btn {
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--surface-primary);
            border: 1px solid var(--surface-border);
            border-radius: var(--border-radius-sm);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .action-btn:hover {
            background: var(--surface-secondary);
            color: var(--text-primary);
        }

        .result-content {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
            padding: var(--spacing-md);
            font-family: 'SF Mono', 'Monaco', 'Cascadia Code', 'Roboto Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            color: var(--text-secondary);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .result-content::-webkit-scrollbar {
            width: 4px;
        }

        .result-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .result-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-top: var(--spacing-sm);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
        }

        .status-dot.processing {
            background: var(--warning-color);
        }

        .status-dot.error {
            background: var(--error-color);
            animation: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: var(--spacing-sm) 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
            transition: width var(--transition-fast);
            width: 0%;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .toast {
            position: fixed;
            bottom: var(--spacing-xl);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-primary);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: 50px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            transition: all var(--transition-medium);
            font-weight: 500;
            font-size: 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: auto;
            padding-top: var(--spacing-xl);
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .footer a:hover {
            color: var(--text-primary);
        }

        .hidden {
            display: none !important;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            body {
                padding: var(--spacing-md);
            }

            .app-title {
                font-size: 2rem;
            }

            .scanner-card {
                padding: var(--spacing-md);
            }

            .scan-frame {
                width: 240px;
                height: 120px;
            }

            .camera-container {
                margin-bottom: var(--spacing-md);
            }

            .upload-icon {
                width: 40px;
                height: 40px;
            }

            .input-tab {
                font-size: 0.8rem;
                padding: var(--spacing-xs) var(--spacing-sm);
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {

            .scan-frame::before,
            .status-dot {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <header class="app-header">
            <h1 class="app-title">Text Recognizer</h1>
            <p class="app-subtitle">Extract text from images using your camera or upload</p>
        </header>

        <div class="scanner-card">
            <div class="input-methods">
                <div class="input-tab active" data-tab="camera">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                        </path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    Camera
                </div>
                <div class="input-tab" data-tab="upload">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17,8 12,3 7,8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload
                </div>
            </div>

            <div class="input-content active" id="camera-content">
                <div class="camera-container">
                    <video id="video" playsinline autoplay muted></video>
                    <div class="scan-overlay" id="text-overlay">
                        <div class="scan-frame">
                            <div class="scan-corners">
                                <div class="scan-corner top-left"></div>
                                <div class="scan-corner top-right"></div>
                                <div class="scan-corner bottom-left"></div>
                                <div class="scan-corner bottom-right"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="capture-controls" id="camera-controls">
                    <button class="capture-btn primary" id="capture-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        Capture Image
                    </button>
                    <button class="capture-btn" id="retake-btn" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <polyline points="23 20 23 14 17 14"></polyline>
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                        </svg>
                        Retake
                    </button>
                    <button class="capture-btn primary" id="recognize-btn" style="display: none;" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
                        </svg>
                        Recognize Text
                    </button>
                </div>
            </div>

            <div class="input-content" id="upload-content">
                <div class="upload-container">
                    <div class="file-upload-area" id="fileUploadArea">
                        <input type="file" id="fileInput" accept="image/*">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17,8 12,3 7,8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <div class="upload-text">Drop images with text here</div>
                        <div class="upload-subtext">or click to browse files (PNG, JPG, GIF)</div>
                    </div>
                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="Uploaded image">
                        <button class="remove-image" id="removeImage">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>

                    <button class="capture-btn primary hidden" id="upload-recognize-btn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
                        </svg>
                        Recognize Text
                    </button>
                </div>
            </div>

            <div class="result-section" id="result-container">
                <div class="result-header">
                    <div class="result-icon">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14,2 14,8 20,8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                    </div>
                    <div class="result-title">Recognized Text</div>
                    <div class="result-actions">
                        <button class="action-btn" id="copyBtn" style="display: none;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>
                        <button class="action-btn" id="shareBtn" style="display: none;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="3"></circle>
                                <circle cx="6" cy="12" r="3"></circle>
                                <circle cx="18" cy="19" r="3"></circle>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                            </svg>
                            Share
                        </button>
                    </div>
                </div>
                <div class="result-content" id="result">
                    Ready to capture text...
                </div>
                <div class="progress-bar hidden" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="statusText">Loading AI model...</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2025
            <a href="https://vylex.co.za" target="_blank" rel="noopener noreferrer">Vylex</a> OCR Tool
        </p>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
        class TextRecognizer {
            constructor() {
                // DOM Elements
                this.video = document.getElementById('video');
                this.resultContainer = document.getElementById('result-container');
                this.result = document.getElementById('result');
                this.toast = document.getElementById('toast');
                this.fileInput = document.getElementById('fileInput');
                this.fileUploadArea = document.getElementById('fileUploadArea');
                this.imagePreview = document.getElementById('imagePreview');
                this.previewImg = document.getElementById('previewImg');
                this.removeImageBtn = document.getElementById('removeImage');
                this.copyBtn = document.getElementById('copyBtn');
                this.shareBtn = document.getElementById('shareBtn');
                this.statusText = document.getElementById('statusText');

                // Interaction Elements
                this.captureBtn = document.getElementById('capture-btn');
                this.retakeBtn = document.getElementById('retake-btn');
                this.recognizeBtn = document.getElementById('recognize-btn');
                this.uploadRecognizeBtn = document.getElementById('upload-recognize-btn');
                this.textOverlay = document.getElementById('text-overlay');
                this.statusDot = document.getElementById('status-dot');
                this.progressBar = document.getElementById('progress-bar');
                this.progressFill = document.getElementById('progress-fill');

                // State variables
                this.stream = null;
                this.currentTab = 'camera';
                this.tesseractWorker = null;
                this.isTesseractReady = false;
                this.cameraImageCaptured = false;
                this.capturedImageData = null;
                this.uploadImageFile = null;
                this.lastResult = null;

                this.init();
            }

            async init() {
                this.initEventListeners();
                this.switchTab('camera');
                await this.initializeTesseract();
            }

            initEventListeners() {
                // Tab switching
                document.querySelectorAll('.input-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.switchTab(tab.dataset.tab);
                    });
                });

                // Upload events
                this.fileInput.addEventListener('change', (e) => this.handleFileSelect(e));
                this.fileUploadArea.addEventListener('dragover', (e) => this.handleDragOver(e));
                this.fileUploadArea.addEventListener('dragleave', (e) => this.handleDragLeave(e));
                this.fileUploadArea.addEventListener('drop', (e) => this.handleDrop(e));
                this.removeImageBtn.addEventListener('click', () => this.removeImage());

                // Action buttons
                this.copyBtn.addEventListener('click', () => this.copyResult());
                this.shareBtn.addEventListener('click', () => this.shareResult());

                // Camera/Recognition buttons
                this.captureBtn.addEventListener('click', () => this.captureImage());
                this.retakeBtn.addEventListener('click', () => this.retakeImage());
                this.recognizeBtn.addEventListener('click', () => this.recognizeText(this.capturedImageData));
                this.uploadRecognizeBtn.addEventListener('click', () => this.recognizeText(this.uploadImageFile));
            }

            async initializeTesseract() {
                try {
                    this.updateStatus('Loading AI text model...', 'processing');
                    this.tesseractWorker = await Tesseract.createWorker('eng', 1, {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                const progress = Math.round(m.progress * 100);
                                this.updateProgress(progress);
                                this.updateStatus(`Recognizing text... ${progress}%`, 'processing');
                            }
                        }
                    });
                    this.isTesseractReady = true;
                    this.updateStatus('AI model loaded. Ready.', 'success');
                    this.updateUI();
                } catch (error) {
                    console.error('Tesseract initialization error:', error);
                    this.updateStatus('Failed to load AI model', 'error');
                }
            }

            switchTab(tabName) {
                if (this.currentTab === tabName && this.stream && tabName === 'camera') return;
                this.currentTab = tabName;

                document.querySelectorAll('.input-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.tab === tabName);
                });

                document.querySelectorAll('.input-content').forEach(content => {
                    content.classList.toggle('active', content.id === `${tabName}-content`);
                });

                if (tabName === 'camera') {
                    this.startCamera();
                    this.clearResult();
                } else {
                    this.stopCamera();
                    this.updateStatus(this.isTesseractReady ? 'Ready to upload image' : 'Loading AI model...',
                        this.isTesseractReady ? 'success' : 'processing');
                    this.clearResult();
                }

                this.updateUI();
            }

            async startCamera() {
                try {
                    const constraints = {
                        video: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    };

                    this.stream = await navigator.mediaDevices.getUserMedia(constraints);
                    this.video.srcObject = this.stream;

                    this.video.onloadedmetadata = () => {
                        this.video.play();
                        this.updateStatus('Camera active', 'success');
                        this.updateUI();
                    };
                } catch (error) {
                    console.error('Error starting camera:', error);
                    this.updateStatus('Camera unavailable', 'error');
                    this.result.textContent = "Camera access denied or no camera available.";
                }
            }

            stopCamera() {
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
            }

            captureImage() {
                if (!this.stream) return;

                this.video.pause();
                this.cameraImageCaptured = true;

                const canvas = document.createElement('canvas');
                canvas.width = this.video.videoWidth;
                canvas.height = this.video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(this.video, 0, 0, canvas.width, canvas.height);

                canvas.toBlob(blob => {
                    this.capturedImageData = blob;
                    this.updateStatus('Image captured. Click Recognize.', 'success');
                    this.updateUI();
                }, 'image/jpeg', 0.95);
            }

            retakeImage() {
                this.cameraImageCaptured = false;
                this.capturedImageData = null;
                this.video.play();
                this.clearResult();
                this.updateStatus('Camera active', 'success');
                this.updateUI();
            }

            handleFileSelect(event) {
                const files = event.target.files;
                if (files.length > 0) {
                    this.processImageFile(files[0]);
                }
            }

            handleDragOver(event) {
                event.preventDefault();
                this.fileUploadArea.classList.add('dragover');
            }

            handleDragLeave(event) {
                event.preventDefault();
                this.fileUploadArea.classList.remove('dragover');
            }

            handleDrop(event) {
                event.preventDefault();
                this.fileUploadArea.classList.remove('dragover');

                const files = event.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('image/')) {
                    this.processImageFile(files[0]);
                }
            }

            processImageFile(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.uploadImageFile = file;
                    this.previewImg.src = e.target.result;
                    this.updateStatus('Image loaded. Click Recognize.', 'success');
                    this.updateUI();
                };
                reader.readAsDataURL(file);
            }

            removeImage() {
                this.uploadImageFile = null;
                this.fileInput.value = '';
                this.updateStatus('Ready to upload image', 'success');
                this.clearResult();
                this.updateUI();
            }

            async recognizeText(imageSource) {
                if (!this.isTesseractReady || !imageSource) {
                    this.showToast('❌ Configuration not ready or image missing');
                    return;
                }

                try {
                    this.updateStatus('Processing image...', 'processing');
                    this.showProgress(true);
                    this.clearResultContent();

                    const { data: { text } } = await this.tesseractWorker.recognize(imageSource);

                    this.showProgress(false);

                    if (text.trim()) {
                        this.handleTextResult(text.trim());
                    } else {
                        this.updateStatus('No text found in image', 'error');
                        this.result.textContent = 'No text found in the image. Try retaking or uploading a clearer image.';
                    }
                } catch (error) {
                    console.error('Text recognition error:', error);
                    this.showProgress(false);
                    this.updateStatus('Text recognition failed', 'error');
                    this.showToast('❌ Failed to recognize text');
                    this.result.textContent = 'An error occurred while analyzing the image.';
                }
            }

            handleTextResult(text) {
                this.lastResult = text;
                this.result.textContent = text;
                this.showToast('✓ Text recognized!');
                this.updateStatus('Text recognition complete', 'success');

                this.resultContainer.style.background = 'rgba(59, 130, 246, 0.1)';
                this.resultContainer.style.borderColor = 'rgba(59, 130, 246, 0.3)';

                this.copyBtn.style.display = 'flex';
                if (navigator.share) {
                    this.shareBtn.style.display = 'flex';
                }

                setTimeout(() => {
                    this.resultContainer.style.background = 'var(--surface-secondary)';
                    this.resultContainer.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                }, 3000);
            }

            clearResult() {
                this.clearResultContent();
                const placeholderText = this.currentTab === 'camera' ? 'Ready to capture text...' : 'Ready to upload image...';
                this.result.textContent = placeholderText;
            }

            clearResultContent() {
                this.result.textContent = '';
                this.copyBtn.style.display = 'none';
                this.shareBtn.style.display = 'none';
                this.lastResult = null;
            }

            updateUI() {
                if (this.currentTab === 'camera') {
                    // Update camera specific controls
                    this.captureBtn.style.display = this.cameraImageCaptured ? 'none' : 'flex';
                    this.retakeBtn.style.display = this.cameraImageCaptured ? 'flex' : 'none';
                    this.recognizeBtn.style.display = this.cameraImageCaptured ? 'flex' : 'none';

                    this.recognizeBtn.disabled = !this.isTesseractReady;
                    this.textOverlay.classList.toggle('hidden', this.cameraImageCaptured);
                } else {
                    // Update upload specific controls
                    const hasUpload = !!this.uploadImageFile;
                    this.fileUploadArea.style.display = hasUpload ? 'none' : 'block';
                    this.imagePreview.style.display = hasUpload ? 'block' : 'none';

                    this.uploadRecognizeBtn.classList.toggle('hidden', !hasUpload);
                    this.uploadRecognizeBtn.disabled = !this.isTesseractReady;
                }
            }

            updateStatus(message, type) {
                this.statusText.textContent = message;
                if (this.statusDot) {
                    this.statusDot.className = `status-dot ${type === 'processing' ? 'processing' : type === 'error' ? 'error' : ''}`;
                }
            }

            showProgress(show) {
                this.progressBar.classList.toggle('hidden', !show);
                if (!show) {
                    this.progressFill.style.width = '0%';
                }
            }

            updateProgress(percent) {
                this.progressFill.style.width = `${percent}%`;
            }

            async copyResult() {
                if (this.lastResult) {
                    try {
                        await navigator.clipboard.writeText(this.lastResult);
                        this.showToast('📋 Copied to clipboard');
                    } catch (error) {
                        this.showToast('❌ Failed to copy');
                    }
                }
            }

            async shareResult() {
                if (this.lastResult && navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Recognized Text',
                            text: this.lastResult
                        });
                    } catch (error) {
                        console.error('Share failed:', error);
                    }
                }
            }

            showToast(message) {
                this.toast.textContent = message;
                this.toast.classList.add('show');

                setTimeout(() => {
                    this.toast.classList.remove('show');
                }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new TextRecognizer();
        });
    </script>
</body>

</html>
