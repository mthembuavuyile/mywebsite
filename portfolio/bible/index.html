<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ================= BASIC META ================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Online Bible | Vylex | Read Scripture Anytime</title>

    <meta name="description"
        content="Read the Bible online for free with a clean, distraction-free experience. Access scripture anytime on mobile and desktop with Vylex.">

    <meta name="keywords"
        content="Bible online, free Bible, read Bible online, scripture, King James Bible, online Bible South Africa, Bible app, Vylex Bible">

    <meta name="author" content="Vylex">

    <!-- ================= CANONICAL ================= -->
    <link rel="canonical" href="https://vylex.co.za/portfolio/bible">

    <!-- ================= ROBOTS ================= -->
    <meta name="robots" content="index, follow">

    <!-- ================= FAVICONS ================= -->
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/assets/icons/favicon-96x96.png">
    <link rel="shortcut icon" href="/assets/icons/favicon.ico">

    <!-- ================= OPEN GRAPH ================= -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Free Online Bible | Vylex">
    <meta property="og:description"
        content="Read the Bible online with a clean, distraction-free experience on any device.">
    <meta property="og:url" content="https://vylex.co.za/portfolio/bible">
    <meta property="og:image" content="https://vylex.co.za/assets/bible-preview.jpg">
    <meta property="og:site_name" content="Vylex">

    <!-- ================= TWITTER ================= -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Free Online Bible | Vylex">
    <meta name="twitter:description"
        content="Read scripture online with a fast, mobile-friendly, distraction-free interface.">
    <meta name="twitter:image" content="https://vylex.co.za/assets/bible-preview.jpg">

    <!-- ================= THEME ================= -->
    <meta name="theme-color" content="#111827">

    <!-- ================= STRUCTURED DATA ================= -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Vylex Bible",
        "url": "https://vylex.co.za/portfolio/bible",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "All",
        "description": "A free, distraction-free online Bible reading platform by Vylex.",
        "inLanguage": "en",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "ZAR"
        },
        "publisher": {
            "@type": "Organization",
            "name": "Vylex",
            "url": "https://vylex.co.za"
        }
    }
    </script>

    <!-- ================= TAILWIND ================= -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Alpine.js -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.0/cdn.min.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbar for clean mobile UI */
        ::-webkit-scrollbar {
            display: none;
        }

        * {
            scrollbar-width: none;
        }

        /* Smooth continuous verse styling */
        .reading-content {
            text-align: left;
        }

        .verse-number {
            vertical-align: super;
            font-size: 0.65em;
            font-weight: 700;
            margin-right: 0.2rem;
            margin-left: 0.3rem;
            opacity: 0.7;
        }

        /* Interactive verse hover/active states */
        .verse-span {
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
            padding: 2px 0;
        }

        /* --- Custom Sepia Theme Overrides --- */
        html.sepia {
            background-color: #fbf0d9;
            color: #4a3b2c;
        }

        html.sepia .theme-bg {
            background-color: #fbf0d9 !important;
        }

        html.sepia .theme-surface {
            background-color: #f4e4c4 !important;
        }

        html.sepia .theme-text {
            color: #3a2a18 !important;
        }

        html.sepia .theme-text-muted {
            color: #8c7355 !important;
        }

        html.sepia .theme-border {
            border-color: #dfc8a6 !important;
        }

        html.sepia .theme-accent {
            color: #b84a23 !important;
        }

        html.sepia .theme-accent-bg {
            background-color: #b84a23 !important;
            color: #fdf6e3 !important;
        }

        html.sepia .verse-active {
            background-color: #dfc8a6 !important;
        }

        .verse-highlighted {
            background-color: #fdf5e6; /* Lightest yellow/cream */
        }

        /* Sepia theme override for highlights */
        html.sepia .verse-highlighted {
            background-color: #f4e4c4 !important; /* A subtle sepia highlight */
        }

        /* Make sure active state still visually overrides highlight when both are true */
        .verse-active {
            background-color: #e0e7ff !important; /* Tailwind's indigo-100 */
        }
        html.dark .verse-active {
            background-color: #1e284a !important; /* Tailwind's indigo-900/50 */
        }
        html.sepia .verse-active {
            background-color: #dfc8a6 !important; /* Sepia's verse-active */
        }

        /* New styling for highlighted verses (when not active) */
        .highlight-yellow-light {
            background-color: #fef9c3 !important; /* yellow-100 */
        }
        .dark .highlight-yellow-dark {
            background-color: #422006 !important; /* A darker yellow for dark mode */
        }
        .sepia .highlight-yellow-sepia {
            background-color: #fbe4af !important; /* A sepia-friendly yellow */
        }
    </style>
</head>

<body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 theme-bg theme-text transition-colors duration-300 antialiased"
    x-data="bibleApp()" x-init="init()">

    <!-- TOP NAVIGATION BAR -->
    <header
        class="fixed top-0 w-full bg-white dark:bg-gray-900 theme-surface border-b border-gray-200 dark:border-gray-800 theme-border z-30 shadow-sm h-14 flex items-center justify-between px-4 transition-colors duration-300">
        <!-- Theme Switcher -->
        <button @click="cycleTheme()"
            class="w-10 h-10 flex items-center justify-center rounded-full active:bg-gray-100 dark:active:bg-gray-800 theme-text-muted">
            <i class="fas"
                :class="{'fa-sun': theme === 'light', 'fa-moon': theme === 'dark', 'fa-book-open': theme === 'sepia'}"></i>
        </button>

        <!-- Book & Chapter Title (Click to Navigate) -->
        <button @click="openNavigator()"
            class="flex flex-col items-center justify-center px-4 py-1 rounded-full active:bg-gray-100 dark:active:bg-gray-800 transition-colors">
            <h1 class="font-bold text-lg leading-tight theme-text" x-text="`${currentBookName} ${selectedChapter}`">
            </h1>
            <span
                class="text-[10px] font-medium text-gray-500 dark:text-gray-400 theme-text-muted uppercase tracking-wider"
                x-text="translationName"></span>
        </button>

        <!-- Translation Selector -->
        <button @click="openTranslations()"
            class="w-10 h-10 flex items-center justify-center rounded-full active:bg-gray-100 dark:active:bg-gray-800 theme-text-muted">
            <i class="fas fa-language"></i>
        </button>
    </header>

    <!-- MAIN READING AREA -->
    <main
        class="pt-20 pb-24 px-5 max-w-3xl mx-auto min-h-screen font-serif text-[1.15rem] leading-[1.85] tracking-wide">
        <!-- Loading Spinner -->
        <div x-show="loading"
            class="flex flex-col items-center justify-center py-20 text-indigo-600 dark:text-indigo-400 theme-accent">
            <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
            <span class="text-sm font-sans font-medium">Loading passage...</span>
        </div>

        <!-- Error State -->
        <div x-show="error"
            class="bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 text-sm font-sans text-center">
            <p x-text="errorMessage"></p>
            <button @click="fetchVerses()" class="mt-3 font-semibold underline">Tap to try again</button>
        </div>

        <!-- Text Content -->
        <div x-show="!loading && !error" class="reading-content" x-transition.opacity.duration.500ms>
            <template x-if="verses.length > 0">
                <p>
                    <template x-for="verse in verses" :key="verse.verse">
                        <span :id="'verse-' + verse.verse" @click="selectVerse(verse)" class="verse-span"
                            :class="{
                                'verse-active': activeVerse?.verse === verse.verse,
                                'highlight-yellow-light dark:highlight-yellow-dark sepia:highlight-yellow-sepia': isVerseHighlighted(verse) && activeVerse?.verse !== verse.verse
                            }">
                            <span class="verse-number theme-accent text-indigo-600 dark:text-indigo-400"
                                x-text="verse.verse"></span><span x-text="verse.text"></span>
                        </span>
                    </template>
                </p>
            </template>

            <!-- Elegant Footer -->
            <div class="mt-16 pt-8 pb-4 border-t border-gray-200 dark:border-gray-800 theme-border text-center">
                <p class="text-xs font-sans text-gray-400 dark:text-gray-500 theme-text-muted leading-relaxed">
                    Scripture texts are from public domain translations (KJV, WEB, BBE).<br>
                    Data provided via bible-api.com and bolls.life.<br>
                    Built by
                    <a href="https://vylex.co.za" target="_blank"
                        class="font-medium theme-accent text-orange-500 hover:text-orange-600">
                        Vylex Technologies
                    </a>
                </p>
            </div>
        </div>
    </main>

    <!-- BOTTOM TOOLBAR -->
    <div
        class="fixed bottom-0 w-full bg-white/90 dark:bg-gray-900/90 theme-surface backdrop-blur-md border-t border-gray-200 dark:border-gray-800 theme-border z-20 pb-safe">
        <div class="flex justify-between items-center h-16 px-6 max-w-3xl mx-auto">
            <button @click="prevChapter()" :disabled="isFirstChapter()"
                class="w-12 h-12 flex items-center justify-center rounded-full active:bg-gray-100 dark:active:bg-gray-800 disabled:opacity-30 transition-all theme-text">
                <i class="fas fa-chevron-left text-xl"></i>
            </button>
            <button @click="openNavigator()"
                class="px-6 h-10 bg-indigo-50 dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 theme-accent-bg rounded-full font-sans font-semibold text-sm shadow-sm active:scale-95 transition-transform">
                Browse
            </button>
            <button @click="nextChapter()" :disabled="isLastChapter()"
                class="w-12 h-12 flex items-center justify-center rounded-full active:bg-gray-100 dark:active:bg-gray-800 disabled:opacity-30 transition-all theme-text">
                <i class="fas fa-chevron-right text-xl"></i>
            </button>
        </div>
    </div>

    <!-- FULL SCREEN NAVIGATOR MODAL (Books & Chapters) -->
    <div x-show="showNavigator" x-cloak
        class="fixed inset-0 z-50 bg-white dark:bg-gray-900 theme-surface flex flex-col font-sans"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 transform translate-y-full"
        x-transition:enter-end="opacity-100 transform translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 transform translate-y-0"
        x-transition:leave-end="opacity-0 transform translate-y-full">
        <!-- Modal Header -->
        <div
            class="flex justify-between items-center h-14 px-4 border-b border-gray-200 dark:border-gray-800 theme-border shadow-sm">
            <button @click="navStep = 'books'" x-show="navStep === 'chapters'"
                class="w-10 h-10 flex items-center justify-center theme-text">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div x-show="navStep === 'books'" class="w-10"></div> <!-- Spacer -->
            <h2 class="font-bold text-lg theme-text" x-text="navStep === 'books' ? 'Select Book' : navBookName"></h2>
            <button @click="showNavigator = false" class="w-10 h-10 flex items-center justify-center theme-text">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto p-4">
            <!-- Step 1: Books List -->
            <div x-show="navStep === 'books'" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 -translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">

                <!-- Search Input for Books -->
                <div class="mb-4">
                    <div class="relative flex items-center">
                        <i class="fas fa-search absolute left-4 text-gray-400 dark:text-gray-500 theme-text-muted"></i>
                        <input type="text" x-model="searchQuery" placeholder="Search book..."
                            class="w-full bg-gray-50 dark:bg-gray-800 theme-bg theme-text border border-gray-200 dark:border-gray-700 theme-border rounded-xl pl-10 pr-10 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all shadow-sm">
                        <button x-show="searchQuery.length > 0" @click="searchQuery = ''" x-cloak
                            class="absolute right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 theme-text-muted">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                </div>

                <div x-show="oldTestamentBooks.length > 0">
                    <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 mt-2">
                        Old Testament</h3>
                    <div class="grid grid-cols-1 gap-1 mb-6">
                        <template x-for="book in oldTestamentBooks" :key="book.id">
                            <button @click="selectNavBook(book)"
                                class="text-left px-4 py-3 rounded-xl font-medium text-gray-800 dark:text-gray-200 theme-text active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                                x-text="book.name"></button>
                        </template>
                    </div>
                </div>

                <div x-show="newTestamentBooks.length > 0">
                    <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">New
                        Testament</h3>
                    <div class="grid grid-cols-1 gap-1 pb-10">
                        <template x-for="book in newTestamentBooks" :key="book.id">
                            <button @click="selectNavBook(book)"
                                class="text-left px-4 py-3 rounded-xl font-medium text-gray-800 dark:text-gray-200 theme-text active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                                x-text="book.name"></button>
                        </template>
                    </div>
                </div>

                <!-- Empty State -->
                <div x-show="oldTestamentBooks.length === 0 && newTestamentBooks.length === 0" x-cloak
                    class="text-center py-8">
                    <p class="text-gray-500 dark:text-gray-400 theme-text-muted">No books found matching "<span
                            x-text="searchQuery"></span>"</p>
                </div>
            </div>

            <!-- Step 2: Chapter Grid -->
            <div x-show="navStep === 'chapters'" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0"
                class="pb-10">
                <div class="grid grid-cols-5 gap-3">
                    <template x-for="c in navChapters" :key="c">
                        <button @click="executeNavigation(c)"
                            class="aspect-square flex items-center justify-center rounded-xl font-semibold text-lg border border-gray-200 dark:border-gray-700 theme-border theme-text active:bg-indigo-600 active:text-white dark:active:bg-indigo-500 transition-colors"
                            x-text="c"></button>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- TRANSLATION SELECTOR (Bottom Sheet) -->
    <div x-show="showTranslationMenu" x-cloak class="fixed inset-0 z-50 flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm" @click="showTranslationMenu = false"
            x-transition.opacity></div>
        <div class="relative bg-white dark:bg-gray-900 theme-surface rounded-t-3xl p-6 pb-12 font-sans"
            x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-y-full"
            x-transition:enter-end="translate-y-0" x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mb-6"></div>
            <h3 class="font-bold text-xl mb-4 theme-text">Select Translation</h3>
            <div class="space-y-2">
                <template x-for="trans in translations" :key="trans.id">
                    <button @click="setTranslation(trans.id)"
                        class="w-full text-left px-5 py-4 rounded-2xl flex justify-between items-center transition-colors"
                        :class="translation === trans.id ? 'bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400 theme-accent-bg font-semibold' : 'active:bg-gray-100 dark:active:bg-gray-800 theme-text'">
                        <span x-text="trans.name"></span>
                        <i x-show="translation === trans.id" class="fas fa-check"></i>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <!-- VERSE ACTIONS (Bottom Sheet) -->
    <div x-show="activeVerse" x-cloak class="fixed inset-0 z-50 flex flex-col justify-end">
        <div class="absolute inset-0 bg-black/30 dark:bg-black/60" @click="activeVerse = null" x-transition.opacity>
        </div>
        <div class="relative bg-white dark:bg-gray-900 theme-surface rounded-t-3xl shadow-2xl p-6 font-sans border-t border-gray-100 dark:border-gray-800"
            x-transition:enter="transition ease-out duration-250" x-transition:enter-start="translate-y-full"
            x-transition:enter-end="translate-y-0" x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full">

            <div class="flex justify-between items-start mb-4">
                <h4 class="font-bold text-lg text-indigo-600 dark:text-indigo-400 theme-accent"
                    x-text="`${currentBookName} ${selectedChapter}:${activeVerse?.verse}`"></h4>
                <button @click="activeVerse = null"
                    class="w-8 h-8 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center theme-text">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Verse Preview -->
            <p class="text-sm text-gray-600 dark:text-gray-300 theme-text-muted italic mb-6 line-clamp-3 font-serif"
                x-text="`&quot;${activeVerse?.text}&quot;`"></p>

            <!-- MODIFIED: Action Buttons - changed grid-cols-2 to grid-cols-3 and added Highlight button -->
            <div class="grid grid-cols-3 gap-4">
                <button @click="copyActiveVerse()"
                    class="flex flex-col items-center justify-center py-4 bg-gray-50 dark:bg-gray-800 theme-bg rounded-2xl active:scale-95 transition-transform theme-text">
                    <i class="fas fa-copy text-xl mb-2 text-gray-500 theme-text-muted"></i>
                    <span class="text-sm font-semibold">Copy Verse</span>
                </button>
                <button @click="shareActiveVerse()"
                    class="flex flex-col items-center justify-center py-4 bg-indigo-600 text-white rounded-2xl active:scale-95 transition-transform shadow-md theme-accent-bg">
                    <i class="fas fa-share-nodes text-xl mb-2"></i>
                    <span class="text-sm font-semibold">Share</span>
                </button>
                <!-- NEW HIGHLIGHT BUTTON -->
                <button @click="toggleHighlight(activeVerse)"
                    :class="{
                        'bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-200': isVerseHighlighted(activeVerse),
                        'bg-gray-50 dark:bg-gray-800 theme-bg theme-text': !isVerseHighlighted(activeVerse)
                    }"
                    class="flex flex-col items-center justify-center py-4 rounded-2xl active:scale-95 transition-transform">
                    <i class="fas fa-highlighter text-xl mb-2"
                       :class="{'text-yellow-600 dark:text-yellow-400': isVerseHighlighted(activeVerse), 'text-gray-500 theme-text-muted': !isVerseHighlighted(activeVerse)}"></i>
                    <span class="text-sm font-semibold" x-text="isVerseHighlighted(activeVerse) ? 'Unhighlight' : 'Highlight'"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div x-show="toast.show" x-cloak
        class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300"
        x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 -translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-4">
        <div
            class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full shadow-lg font-sans text-sm font-medium flex items-center space-x-2">
            <i class="fas fa-check-circle text-green-400 dark:text-green-500"></i>
            <span x-text="toast.message"></span>
        </div>
    </div>

    <!-- Application Logic -->
    <script src="script.js">
    </script>
</body>

</html>
