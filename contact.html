<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Avuyile Mthembu. Contact via email, phone, or social media. Let's collaborate on exciting projects!">
  <meta name="keywords" content="Contact Avuyile Mthembu, Web Developer, South Africa, Freelance Developer, Hire Web Developer, Collaboration">
  <meta name="author" content="Avuyile Mthembu">

  <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
  <link rel="canonical" href="https://avuyilemthembu.co.za/contact">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <title>Contact Avuyile Mthembu | Get in Touch</title>

  <meta property="og:title" content="Contact Avuyile Mthembu | Get in Touch">
  <meta property="og:description" content="Reach out to Avuyile Mthembu for collaborations, projects, or inquiries.">
  <meta property="og:image" content="https://avuyilemthembu.co.za/images/contact-banner.jpg">
  <meta property="og:url" content="https://avuyilemthembu.co.za/contact">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact Avuyile Mthembu | Get in Touch">
  <meta name="twitter:description" content="Connect with Avuyile Mthembu for projects and inquiries.">
  <meta name="twitter:image" content="https://avuyilemthembu.co.za/images/contact-banner.jpg">

  <link rel="stylesheet" href="css/global.css">

  <style>

    /* Contact Page Specific Styles */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-info-list {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .info-item i {
      font-size: 1.5rem;
      color: var(--color-accent);
      margin-top: 0.25rem;
    }

    .info-item h3 {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .info-item p {
      color: var(--color-text-muted);
      margin-bottom: 0;
    }

    .social-icons {
      display: flex;
      gap: 1.25rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
    }

    .social-icons a {
      color: var(--color-text-muted);
      font-size: 1.5rem;
      transition: color 0.2s, transform 0.2s;
    }

    .social-icons a:hover {
      color: var(--color-accent);
      transform: translateY(-2px);
    }

    .contact-form-wrapper {
      background: var(--color-bg-page);
      border: 1px solid var(--color-border);
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--color-brand);
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--color-text-main);
      background-color: var(--color-bg-alt);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--color-accent);
      background-color: var(--color-bg-page);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 150px;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-size: 0.9rem;
      background-color: var(--color-bg-page);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .mobile-menu-btn {
        display: block;
      }

      .contact-grid {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .contact-form-wrapper {
        padding: 1.5rem;
      }

      .section {
        padding: 3rem 0;
      }
    }
  </style>
  <script src="/components/components.js" defer></script>

</head>

<body>

    <site-header></site-header>



  <main>
    <section class="section" id="contact">
      <div class="container">
        <div class="section-header">
          <h1 class="section-title">Get in Touch</h1>
          <p class="section-subtitle">Let's create something amazing together</p>
        </div>

        <div class="contact-grid">
          
          <div class="contact-info">
            <div class="contact-info-list">
              <div class="info-item">
                <i class="fas fa-phone"></i>
                <div>
                  <h3>Phone</h3>
                  <p>064 878 4287</p>
                </div>
              </div>
              <div class="info-item">
                <i class="fas fa-envelope"></i>
                <div>
                  <h3>Email</h3>
                  <p>mthembuavuyile@gmail.com</p>
                  <p>info@avuyilemthembu.co.za</p>

                </div>
              </div>
              <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <div>
                  <h3>Location</h3>
                  <p>South Africa</p>
                </div>
              </div>
            </div>

            <div class="social-icons">
              <a href="https://instagram.com/mthembu_avuyile_sa" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
              </a>
              <a href="https://twitter.com/MthembuAvuyile" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
              </a>
              <a href="https://web.facebook.com/people/Avuyile-Mthembu/100070277396863/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                <i class="fab fa-facebook"></i>
              </a>
              <a href="https://www.tiktok.com/@mthembu_avuyile_sa" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                <i class="fab fa-tiktok"></i>
              </a>
            </div>
          </div>

          <div class="contact-form-wrapper">
            <form id="contactForm">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-control" required placeholder="How can we work together?"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
          </div>

        </div>
      </div>
    </section>
  </main>

  <site-footer></site-footer>

  <script src="scripts/main.js"></script>
  <script src="scripts/form.js"></script>

</body>

</html>
