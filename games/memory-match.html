<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

    <title>Nexus Memory Challenge - Play Online Memory Match Game | Vylex</title>
    <meta name="title" content="Nexus Memory Challenge - Play Online Memory Match Game | Vylex">
    <meta name="description" content="Test your focus with Nexus Memory Challenge by Vylex Game Lab. A free, modern, and mobile-optimized memory match game. Play online now and beat your high score!">
    <meta name="keywords" content="memory game, memory match, online game, brain trainer, mobile game, Vylex, free puzzle games, memory challenge">
    <meta name="author" content="Vylex Game Lab">
    <link rel="canonical" href="https://vylex.co.za/memory-match.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vylex.co.za/memory-match.html">
    <meta property="og:title" content="Nexus Memory Challenge - Online Brain Trainer">
    <meta property="og:description" content="Can you find all the matches? Play the sleekest memory game on your mobile device.">
    <meta property="og:image" content="https://vylex.co.za/assets/og-preview.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vylex.co.za/memory-match.html">
    <meta property="twitter:title" content="Nexus Memory Challenge - Online Brain Trainer">
    <meta property="twitter:description" content="Can you find all the matches? Play the sleekest memory game on your mobile device.">
    <meta property="twitter:image" content="https://vylex.co.za/assets/og-preview.jpg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0b1120;
            --surface: rgba(30, 41, 59, 0.4);
            --surface-blur: blur(12px);
            --border-light: rgba(255, 255, 255, 0.1);
            
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #06b6d4;
            --accent: #f43f5e;
            --success: #10b981;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            
            --shadow-float: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100svh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #app {
            width: 100%;
            max-width: 500px;
            min-height: 100svh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
        }

        /* --- Header & Stats --- */
        header {
            text-align: center;
            margin-bottom: 32px;
            padding-top: 10px;
        }

        .brand {
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 20%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .brand-highlight {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: var(--surface-blur);
            -webkit-backdrop-filter: var(--surface-blur);
            padding: 12px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        /* --- Game Grid --- */
        .grid-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0 30px 0;
        }

        .grid {
            display: grid;
            gap: 12px;
            width: 100%;
            max-width: min(100%, 60vh); 
            margin: 0 auto;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: inset 0 0 0 1px var(--border-light);
        }

        .card-front {
            background: linear-gradient(135deg, var(--primary), #6d28d9);
            transform: rotateY(180deg);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .card-back {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: var(--surface-blur);
            -webkit-backdrop-filter: var(--surface-blur);
            color: var(--primary);
            transition: background 0.2s;
        }

        .card:hover .card-back {
            background: rgba(45, 55, 72, 0.9);
        }

        .card-back::after {
            content: '';
            width: 25%;
            height: 25%;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.15;
            box-shadow: 0 0 20px var(--primary);
        }

        .card.matched .card-front {
            background: linear-gradient(135deg, var(--success), #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            color: rgba(255, 255, 255, 0.8);
        }

        /* --- Footer & Credits --- */
        footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .vylex-credit {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .vylex-credit:hover {
            opacity: 1;
        }

        .vylex-credit span {
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- Screens & Modals --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 17, 32, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            overflow-y: auto;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .menu-card {
            width: 100%;
            max-width: 360px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-float);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .menu-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .menu-card p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
        }

        /* --- Buttons --- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-light);
            box-shadow: none;
            color: var(--text-main);
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .diff-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .diff-btn.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- Animations --- */
        @keyframes match-pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.08); box-shadow: 0 0 30px var(--success); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .pulse {
            animation: match-pulse 0.5s ease-out;
        }
    </style>
</head>

<body>

    <div id="app">
        <header>
            <div class="brand">NEXUS <span class="brand-highlight">MEMORY</span></div>
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-label">Moves</div>
                    <div id="moves" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Time</div>
                    <div id="timer" class="stat-value">00:00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best</div>
                    <div id="best" class="stat-value">--</div>
                </div>
            </div>
        </header>

        <div class="grid-container">
            <div id="grid" class="grid"></div>
        </div>

        <footer>
            <button class="btn btn-outline" onclick="showMenu()">Pause Game</button>
            <div class="vylex-credit">Crafted by <span>Vylex</span></div>
        </footer>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="menu-card">
            <div>
                <h2 class="brand" style="font-size: 2.2rem; margin-bottom: 8px;">NEXUS</h2>
                <p>Select your challenge level</p>
            </div>

            <div class="difficulty-selector">
                <button class="diff-btn" onclick="setDiff(12, this)">Casual</button>
                <button class="diff-btn active" onclick="setDiff(16, this)">Standard</button>
                <button class="diff-btn" onclick="setDiff(20, this)">Pro</button>
            </div>

            <button class="btn" onclick="startGame()">Start Game</button>
            
            <div class="vylex-credit" style="justify-content: center; margin-top: 8px;">
                by <span>Vylex Game Lab</span>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="overlay hidden">
        <div class="menu-card">
            <div>
                <h2 id="win-title" style="color: var(--success);">Level Cleared!</h2>
                <p id="win-stats" style="margin-top: 10px;">Moves: 24 | Time: 01:20</p>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn" onclick="startGame()">Play Again</button>
                <button class="btn btn-outline" onclick="showMenu()">Main Menu</button>
            </div>
            
            <div class="vylex-credit" style="justify-content: center; margin-top: 8px;">
                by <span>Vylex Game Lab</span>
            </div>
        </div>
    </div>

    <script>
        const emojis = ['🚀', '🪐', '👾', '💎', '🌈', '🔥', '🔋', '🔮', '🧬', '🛡️', '🕹️', '📡'];
        let config = { size: 16, cols: 4 };
        let state = {
            flipped: [],
            matches: 0,
            moves: 0,
            timer: 0,
            timerInterval: null,
            isLocked: false,
            gameActive: false
        };

        const gridEl = document.getElementById('grid');
        const movesEl = document.getElementById('moves');
        const timerEl = document.getElementById('timer');
        const bestEl = document.getElementById('best');
        const winOverlay = document.getElementById('win-overlay');
        const menuOverlay = document.getElementById('menu-overlay');

        bestEl.textContent = localStorage.getItem('nexus_best') || '--';

        function setDiff(size, btn) {
            config.size = size;
            config.cols = size === 12 ? 3 : 4;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function showMenu() {
            clearInterval(state.timerInterval);
            menuOverlay.classList.remove('hidden');
            winOverlay.classList.add('hidden');
        }

        function startGame() {
            state = { flipped: [], matches: 0, moves: 0, timer: 0, isLocked: false, gameActive: true };
            clearInterval(state.timerInterval);

            movesEl.textContent = '0';
            timerEl.textContent = '00:00';
            winOverlay.classList.add('hidden');
            menuOverlay.classList.add('hidden');

            const deck = [...emojis.slice(0, config.size / 2), ...emojis.slice(0, config.size / 2)];
            deck.sort(() => Math.random() - 0.5);

            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

            deck.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-face card-front">${emoji}</div>
                    <div class="card-back card-face"></div>
                `;
                card.onclick = () => flipCard(card);
                gridEl.appendChild(card);
            });

            state.timerInterval = setInterval(() => {
                state.timer++;
                timerEl.textContent = formatTime(state.timer);
            }, 1000);
        }

        function flipCard(card) {
            if (state.isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            state.flipped.push(card);

            if (state.flipped.length === 2) {
                state.moves++;
                movesEl.textContent = state.moves;
                checkMatch();
            }
        }

        function checkMatch() {
            state.isLocked = true;
            const [c1, c2] = state.flipped;
            const isMatch = c1.dataset.emoji === c2.dataset.emoji;

            if (isMatch) {
                state.matches += 2;
                setTimeout(() => {
                    c1.classList.add('matched', 'pulse');
                    c2.classList.add('matched', 'pulse');
                    state.flipped = [];
                    state.isLocked = false;
                    if (state.matches === config.size) endGame();
                }, 400);
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    state.flipped = [];
                    state.isLocked = false;
                }, 1000);
            }
        }

        function endGame() {
            clearInterval(state.timerInterval);
            const score = state.moves;
            const currentBest = localStorage.getItem('nexus_best');

            if (!currentBest || score < currentBest) {
                localStorage.setItem('nexus_best', score);
                bestEl.textContent = score;
            }

            document.getElementById('win-stats').textContent =
                `Moves: ${state.moves} | Time: ${formatTime(state.timer)}`;

            setTimeout(() => {
                winOverlay.classList.remove('hidden');
            }, 600);
        }
    </script>
</body>

</html>
