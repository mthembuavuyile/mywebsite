<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- Primary SEO -->
    <title>Vylex | 3D Interactive Portfolio Experience</title>
    <meta name="title" content="Vylex | 3D Interactive Portfolio Experience">
    <meta name="description" content="Explore the Vylex universe in this interactive 3D cyberpunk portfolio. Drive through our virtual hub to discover web development projects, EdTech solutions, and custom games.">

    <!-- Open Graph / Facebook / LinkedIn -->

    <meta property="og:image" content="https://vylex.co.za/assets/portfolio-preview.jpg"> <!-- Link to a screenshot of the game -->

    <!-- Twitter -->

    <meta property="twitter:description" content="An immersive 3D driving experience showcasing the digital work of Vylex. Built with Three.js.">

    <!-- Favicon (Optional but recommended) -->
    <link rel="icon" type="image/png" href="https://vylex.co.za/favicon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050510;
            color: #fff;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- UI Overlay --- */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        #speed-meter {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        /* --- Mobile Controls --- */
        .control-zone {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        #joystick-zone {
            left: 30px;
        }

        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            transform: translate(0px, 0px);
            transition: transform 0.1s;
        }

        #action-btn {
            right: 30px;
            background: rgba(255, 0, 100, 0.2);
            border-color: rgba(255, 0, 100, 0.5);
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.2);
        }
        
        #action-btn:active {
            background: rgba(255, 0, 100, 0.6);
        }

        #desktop-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            opacity: 0.7;
            font-size: 12px;
        }

        /* --- Interaction Prompts & Modals --- */
        #interaction-prompt {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #portfolio-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #portfolio-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #00ffcc;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            position: relative;
        }

        .modal-content h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        .modal-content p {
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-visit {
            display: inline-block;
            background: #00ffcc;
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-visit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.4);
        }

        .btn-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* Hide desktop controls on mobile */
        @media (hover: none) and (pointer: coarse) {
            #desktop-hint { display: none; }
        }
        
        /* Hide mobile controls on desktop */
        @media (hover: hover) and (pointer: fine) {
            .control-zone { display: none; }
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ffcc;
            font-size: 1.5rem;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00ffcc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div>INITIALIZING VYLEX OS...</div>
    </div>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="logo">VYLEX</div>
        <div id="speed-meter">0 km/h</div>
        
        <div id="interaction-prompt">TAP 'VIEW' TO ACCESS</div>
        <div id="desktop-hint">WASD to Drive | SPACE to Brake | E to Interact</div>

        <!-- Mobile Controls -->
        <div id="joystick-zone" class="control-zone">
            <div id="joystick-knob"></div>
        </div>
        <div id="action-btn" class="control-zone">VIEW</div>
    </div>

    <div id="portfolio-modal">
        <div class="modal-content">
            <span class="btn-close">&times;</span>
            <h2 id="modal-title">Title</h2>
            <p id="modal-desc">Description</p>
            <a id="modal-link" href="#" target="_blank" class="btn-visit">VISIT SITE</a>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.min.js';

        // --- DATA ---
        const portfolioItems = [
            { 
                title: "Vylex Startup", 
                desc: "Innovative technology startup focused on cutting-edge web development solutions.", 
                url: "https://vylex.co.za", 
                color: 0x00ffcc 
            },
            { 
                title: "Avuyile Mthembu", 
                desc: "Personal portfolio showcasing full-stack skills, projects, and professional experience.", 
                url: "https://avuyilemthembu.co.za", 
                color: 0x00aaff 
            },
            { 
                title: "Vylex EdTech", 
                desc: "Educational technology platform providing STEM resources for high school students.", 
                url: "https://vylex.co.za/edTech", 
                color: 0xff00ff 
            },
            { 
                title: "Vylex Games", 
                desc: "Interactive web-based gaming hub featuring custom built browser games.", 
                url: "https://vylex.co.za/games", 
                color: 0xffaa00 
            }
        ];

        // --- GLOBALS ---
        let scene, camera, renderer, clock;
        let car, ground;
        let interactables = [];
        let particles;
        
        // Physics & Controls
        let speed = 0;
        let steering = 0;
        const MAX_SPEED = 0.8;
        const ACCELERATION = 0.015;
        const FRICTION = 0.008;
        const TURN_SPEED = 0.04;
        
        let inputs = { forward: false, backward: false, left: false, right: false, brake: false, interact: false };
        let joystick = { x: 0, y: 0, active: false };
        
        let currentIntersect = null;
        let isModalOpen = false;

        // --- INIT ---
        function init() {
            const container = document.getElementById('game-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.012);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 5, -10);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for mobile
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            setupLights();

            // World Objects
            createEnvironment();
            createCar();
            createPortfolioStands();

            // Event Listeners
            setupInputs();
            window.addEventListener('resize', onResize);

            // Start Loop
            document.getElementById('loading-screen').style.display = 'none';
            animate();
        }

        // --- VISUALS ---
        function setupLights() {
            // Ambient glow
            const ambient = new THREE.HemisphereLight(0x000000, 0x111122, 1);
            scene.add(ambient);

            // Moonlight / City glow
            const dirLight = new THREE.DirectionalLight(0xaaccff, 0.5);
            dirLight.position.set(-20, 50, -20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);
        }

        function createEnvironment() {
            // Infinite Grid Floor
            const gridHelper = new THREE.GridHelper(400, 100, 0x333333, 0x111111);
            scene.add(gridHelper);

            // Reflective Ground Plane
            const planeGeo = new THREE.PlaneGeometry(500, 500);
            const planeMat = new THREE.MeshStandardMaterial({ 
                color: 0x080808, 
                roughness: 0.1, 
                metalness: 0.8 
            });
            ground = new THREE.Mesh(planeGeo, planeMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Floating Particles (Stars/Data)
            const partGeo = new THREE.BufferGeometry();
            const partCount = 400;
            const posArray = new Float32Array(partCount * 3);
            for(let i=0; i<partCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 300;
                if(i % 3 === 1) posArray[i] = Math.random() * 20; // Y axis positive only
            }
            partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const partMat = new THREE.PointsMaterial({ size: 0.3, color: 0x00ffcc, transparent: true, opacity: 0.6 });
            particles = new THREE.Points(partGeo, partMat);
            scene.add(particles);
        }

        function createCar() {
            car = new THREE.Group();

            // Main Chassis (Cyberpunk boxy style)
            const bodyGeo = new THREE.BoxGeometry(2.2, 0.8, 4.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2, metalness: 0.8 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.7;
            body.castShadow = true;
            car.add(body);

            // Cabin (Glowing glass)
            const cabGeo = new THREE.BoxGeometry(1.8, 0.6, 2.5);
            const cabMat = new THREE.MeshPhysicalMaterial({ 
                color: 0x000000, 
                roughness: 0, 
                metalness: 1,
                emissive: 0x00ffcc,
                emissiveIntensity: 0.2
            });
            const cabin = new THREE.Mesh(cabGeo, cabMat);
            cabin.position.set(0, 1.4, -0.2);
            car.add(cabin);

            // Wheels (Glowing rims)
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const rimMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc }); // Neon Rims

            [[-1.2, 1.4], [1.2, 1.4], [-1.2, -1.4], [1.2, -1.4]].forEach(pos => {
                const wGroup = new THREE.Group();
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                wGroup.add(w);
                
                // Rim
                const rim = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.02, 8, 16), rimMat);
                rim.rotation.y = Math.PI/2;
                if (pos[0] < 0) rim.position.x = -0.21;
                else rim.position.x = 0.21;
                wGroup.add(rim);

                wGroup.position.set(pos[0], 0.45, pos[1]);
                car.add(wGroup);
            });

            // Headlights
            const spotLightL = new THREE.SpotLight(0xffffff, 20, 60, 0.6, 0.5, 1);
            spotLightL.position.set(-0.8, 0.8, 2.2);
            spotLightL.target.position.set(-0.8, 0, 10);
            car.add(spotLightL);
            car.add(spotLightL.target);

            const spotLightR = spotLightL.clone();
            spotLightR.position.set(0.8, 0.8, 2.2);
            spotLightR.target.position.set(0.8, 0, 10);
            car.add(spotLightR);
            car.add(spotLightR.target);

            // Headlight glow mesh
            const hlGeo = new THREE.BoxGeometry(0.6, 0.2, 0.1);
            const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const hlL = new THREE.Mesh(hlGeo, hlMat); hlL.position.set(-0.8, 0.8, 2.25); car.add(hlL);
            const hlR = new THREE.Mesh(hlGeo, hlMat); hlR.position.set(0.8, 0.8, 2.25); car.add(hlR);

            // Taillights
            const tlGeo = new THREE.BoxGeometry(0.8, 0.2, 0.1);
            const tlMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const tlL = new THREE.Mesh(tlGeo, tlMat); tlL.position.set(-0.8, 0.8, -2.25); car.add(tlL);
            const tlR = new THREE.Mesh(tlGeo, tlMat); tlR.position.set(0.8, 0.8, -2.25); car.add(tlR);
            
            // Red Point Lights for tail glow
            const plBack = new THREE.PointLight(0xff0000, 1, 5);
            plBack.position.set(0, 1, -3);
            car.add(plBack);

            scene.add(car);
        }

        function createPortfolioStands() {
            const distance = 40;
            
            portfolioItems.forEach((item, index) => {
                const angle = (index / portfolioItems.length) * Math.PI * 2;
                const x = Math.sin(angle) * distance;
                const z = Math.cos(angle) * distance;

                const group = new THREE.Group();
                group.position.set(x, 0, z);
                group.lookAt(0, 0, 0); // Face center

                // Pillar
                const pillarGeo = new THREE.BoxGeometry(1, 6, 1);
                const pillarMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.y = 3;
                group.add(pillar);

                // Billboard
                const boardGeo = new THREE.BoxGeometry(12, 7, 0.5);
                const boardMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const board = new THREE.Mesh(boardGeo, boardMat);
                board.position.y = 8;
                group.add(board);

                // Glowing Text/Screen
                const canvas = document.createElement('canvas');
                canvas.width = 512; 
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                
                // Background
                ctx.fillStyle = '#' + item.color.toString(16).padStart(6, '0');
                ctx.fillRect(0,0, 512, 256);
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; // Dark overlay
                ctx.fillRect(10,10, 492, 236);

                // Text
                ctx.fillStyle = '#' + item.color.toString(16).padStart(6, '0');
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(item.title, 256, 140);
                
                const tex = new THREE.CanvasTexture(canvas);
                const screenGeo = new THREE.PlaneGeometry(11, 6);
                const screenMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
                const screen = new THREE.Mesh(screenGeo, screenMat);
                screen.position.set(0, 8, 0.3);
                group.add(screen);

                // Neon borders
                const borderLight = new THREE.PointLight(item.color, 2, 20);
                borderLight.position.set(0, 8, 2);
                group.add(borderLight);

                // Interaction Area Data
                group.userData = { isInteractable: true, info: item };
                interactables.push(group);
                scene.add(group);
            });
        }

        // --- INPUT HANDLING ---
        function setupInputs() {
            // Keyboard
            document.addEventListener('keydown', (e) => onKey(e, true));
            document.addEventListener('keyup', (e) => onKey(e, false));

            // Mobile Joystick
            const zone = document.getElementById('joystick-zone');
            const knob = document.getElementById('joystick-knob');
            
            zone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystick.active = true;
                updateJoystick(e.touches[0], zone, knob);
            }, {passive: false});

            zone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(joystick.active) updateJoystick(e.touches[0], zone, knob);
            }, {passive: false});

            const endJoystick = (e) => {
                e.preventDefault();
                joystick.active = false;
                joystick.x = 0;
                joystick.y = 0;
                knob.style.transform = `translate(0px, 0px)`;
                inputs.forward = false;
                inputs.backward = false;
                inputs.left = false;
                inputs.right = false;
            };
            zone.addEventListener('touchend', endJoystick);
            zone.addEventListener('touchcancel', endJoystick);

            // Action Button
            const actionBtn = document.getElementById('action-btn');
            actionBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerInteraction();
            });
            actionBtn.addEventListener('mousedown', (e) => { // fallback for mouse on button
                triggerInteraction();
            });

            // Modal Close
            document.querySelector('.btn-close').addEventListener('click', closeModal);
        }

        function updateJoystick(touch, zone, knob) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const maxDist = rect.width / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // Clamp
            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            knob.style.transform = `translate(${dx}px, ${dy}px)`;

            // Normalize -1 to 1
            joystick.x = dx / maxDist;
            joystick.y = dy / maxDist;

            // Map to inputs
            const deadzone = 0.2;
            inputs.forward = joystick.y < -deadzone;
            inputs.backward = joystick.y > deadzone;
            inputs.left = joystick.x < -deadzone;
            inputs.right = joystick.x > deadzone;
        }

        function onKey(e, pressed) {
            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW': inputs.forward = pressed; break;
                case 'ArrowDown':
                case 'KeyS': inputs.backward = pressed; break;
                case 'ArrowLeft':
                case 'KeyA': inputs.left = pressed; break;
                case 'ArrowRight':
                case 'KeyD': inputs.right = pressed; break;
                case 'Space': inputs.brake = pressed; break;
                case 'KeyE': 
                    if(pressed) triggerInteraction(); 
                    break;
            }
        }

        function triggerInteraction() {
            if (currentIntersect && !isModalOpen) {
                openModal(currentIntersect.userData.info);
            }
        }

        function openModal(data) {
            isModalOpen = true;
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-desc').innerText = data.desc;
            const btn = document.getElementById('modal-link');
            btn.href = data.url;
            
            const modal = document.getElementById('portfolio-modal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => modal.classList.add('active'));
            
            // Change Action Button text
            document.getElementById('action-btn').innerText = "CLOSE";
            document.getElementById('action-btn').onclick = closeModal;
        }

        function closeModal() {
            const modal = document.getElementById('portfolio-modal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                isModalOpen = false;
            }, 300);

            document.getElementById('action-btn').innerText = "VIEW";
            document.getElementById('action-btn').onclick = null; // Remove direct click handler
        }

        function checkIntersections() {
            if (!car) return;
            let closest = null;
            let minDist = 15; // Detection radius

            interactables.forEach(obj => {
                const dist = car.position.distanceTo(obj.position);
                if (dist < minDist) {
                    minDist = dist;
                    closest = obj;
                }
            });

            currentIntersect = closest;
            const prompt = document.getElementById('interaction-prompt');
            const btn = document.getElementById('action-btn');
            
            if (currentIntersect) {
                prompt.style.display = 'block';
                btn.style.borderColor = "#00ffcc";
                btn.style.color = "#00ffcc";
            } else {
                prompt.style.display = 'none';
                btn.style.borderColor = "rgba(255, 0, 100, 0.5)";
                btn.style.color = "white";
            }
        }

        function updatePhysics() {
            if (isModalOpen) {
                // Quick Stop if interacting
                speed *= 0.9;
                return;
            }

            // Acceleration
            if (inputs.forward) speed += ACCELERATION;
            if (inputs.backward) speed -= ACCELERATION;

            // Brake / Friction
            if (inputs.brake) {
                speed *= 0.9;
            } else {
                speed *= (1 - FRICTION);
            }

            // Joystick Analog Speed control (if active)
            if (joystick.active) {
                // If moving backwards with joystick
                if (Math.abs(joystick.y) > 0.2) {
                     // Override key inputs with analog intensity
                     speed = -joystick.y * MAX_SPEED * (inputs.backward ? 0.5 : 1); 
                     // Simple logic: direct mapping for smoother feel
                     // But we rely on momentum logic above usually. 
                     // Let's just influence momentum:
                }
            }

            // Cap speed
            if (speed > MAX_SPEED) speed = MAX_SPEED;
            if (speed < -MAX_SPEED * 0.5) speed = -MAX_SPEED * 0.5;

            // Turning (Only when moving)
            if (Math.abs(speed) > 0.05) {
                const dir = speed > 0 ? 1 : -1;
                if (inputs.left) car.rotation.y += TURN_SPEED * dir;
                if (inputs.right) car.rotation.y -= TURN_SPEED * dir;
            }

            // Move Car
            car.position.x += Math.sin(car.rotation.y) * speed;
            car.position.z += Math.cos(car.rotation.y) * speed;

            // Update UI Speed
            document.getElementById('speed-meter').innerText = Math.abs(Math.round(speed * 200)) + ' km/h';

            // Camera Follow
            const camDist = 9;
            const camHeight = 5;
            
            // Desired position
            const relativeOffset = new THREE.Vector3(0, camHeight, -camDist);
            const cameraOffset = relativeOffset.applyMatrix4(car.matrixWorld);

            // Smooth lerp
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(car.position.x, car.position.y + 1, car.position.z);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            checkIntersections();
            
            // Animate particles
            if(particles) {
                particles.rotation.y += 0.0005;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
