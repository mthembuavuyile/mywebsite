<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT: Love bot | ALIVE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --accent: #ff2a5f;
            --accent-glow: rgba(255, 42, 95, 0.4);
            --bg-base: #06050a;
            --bg-surface: rgba(20, 18, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f0f0f5;
            --text-muted: #a19db3;
            --font-main: 'Outfit', sans-serif;
            --font-tech: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            background: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 3D CANVAS --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, #1b0a1c 0%, var(--bg-base) 100%);
        }

        /* --- VIGNETTE --- */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background: radial-gradient(circle at center, transparent 30%, rgba(6, 5, 10, 0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- UI WRAPPER --- */
        .app-interface {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- HEADER --- */
        .header {
            padding: max(40px, env(safe-area-inset-top)) 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(6, 5, 10, 0.95) 0%, rgba(6, 5, 10, 0) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid transparent;
        }

        .ai-identity {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ai-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #0077ff);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 1px solid var(--primary);
            opacity: 0.5;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(1.5); opacity: 0; }
        }

        .avatar i {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .ai-brand h1 { 
            font-weight: 700;
            font-size: 1.3rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            background: linear-gradient(to right, #fff, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-tech);
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            background: rgba(255,255,255,0.03);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            width: fit-content;
        }

        .status-dot {
            width: 6px; 
            height: 6px; 
            background: #00e5ff; 
            border-radius: 50%; 
            box-shadow: 0 0 8px #00e5ff; 
            transition: all 0.5s ease;
        }

        .clock {
            font-family: var(--font-tech); 
            color: rgba(255,255,255,0.5); 
            font-size: 0.85rem;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        /* --- CHAT AREA --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }
        
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.ai { align-self: flex-start; align-items: flex-start; }
        .msg-wrapper.system { align-self: center; align-items: center; max-width: 90%; }

        .sender-name {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
            margin-right: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .msg {
            padding: 16px 20px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            word-wrap: break-word;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .msg.user {
            background: linear-gradient(135deg, rgba(255, 42, 95, 0.85) 0%, rgba(200, 20, 60, 0.9) 100%);
            color: #fff;
            border-radius: 20px 20px 4px 20px;
            border: 1px solid rgba(255, 100, 130, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }

        .msg.ai { 
            background: var(--bg-surface); 
            color: var(--text-main);
            border: 1px solid var(--glass-border); 
            border-top: 1px solid var(--glass-highlight);
            border-radius: 20px 20px 20px 4px; 
        }

        .msg.ai strong { color: var(--primary); font-weight: 600; text-shadow: 0 0 10px var(--primary-glow); }
        
        .msg.system { 
            font-size: 0.75rem; 
            background: rgba(0, 229, 255, 0.05); 
            border: 1px dashed rgba(0, 229, 255, 0.3); 
            font-family: var(--font-tech); 
            border-radius: 8px; 
            padding: 10px 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: var(--primary);
            box-shadow: none;
            text-align: center;
        }

        /* TYPING INDICATOR */
        .typing-wrapper {
            display: none;
            padding: 16px 20px;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 20px 20px 20px 4px;
            backdrop-filter: blur(15px);
            align-self: flex-start;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .typing-dots { display: flex; gap: 6px; align-items: center; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; opacity: 0.6; animation: typeBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot.sassy { background: var(--accent); }

        /* --- MEDIA CARDS --- */
        .media-card { 
            width: 100%; 
            border-radius: 16px; 
            overflow: hidden; 
            margin-top: 12px; 
            border: 1px solid var(--glass-border); 
            background: rgba(0,0,0,0.4);
        }
        .media-card img { 
            width: 100%; 
            display: block; 
            object-fit: cover; 
            max-height: 280px; 
            transition: transform 0.3s;
        }
        .media-card img:hover { transform: scale(1.02); }
        .media-caption { 
            padding: 14px 16px; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            border-top: 1px solid rgba(255,255,255,0.05);
            font-style: italic;
        }

        /* --- CONTROLS AREA --- */
        .controls-area {
            background: rgba(10, 8, 15, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            padding: 16px 24px calc(24px + env(safe-area-inset-bottom));
            display: flex; 
            flex-direction: column; 
            gap: 16px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .quick-actions { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding-bottom: 6px; 
            scrollbar-width: none; 
            WebkitOverflowScrolling: touch;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        
        .chip {
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px; 
            border-radius: 30px; 
            font-size: 0.8rem; 
            white-space: nowrap;
            color: var(--text-main); 
            transition: all 0.3s ease; 
            font-family: var(--font-tech); 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .chip i { margin-right: 6px; color: var(--primary); }
        .chip:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .chip:active { background: var(--primary); color: #000; transform: scale(0.95); }
        .chip:active i { color: #000; }

        .input-bar { 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            position: relative; 
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 6px;
            transition: all 0.3s ease;
        }
        
        .input-bar:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            background: rgba(0,0,0,0.6);
        }
        
        input {
            flex: 1; 
            background: transparent; 
            border: none;
            padding: 12px 16px; 
            color: white; 
            font-family: var(--font-main);
            font-size: 1rem; 
            outline: none; 
        }
        input::placeholder { color: rgba(255,255,255,0.3); font-style: italic; font-weight: 300; }

        .btn-send {
            width: 44px; height: 44px; 
            border-radius: 50%; 
            border: none;
            background: linear-gradient(135deg, var(--primary), #00bfff); 
            color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.1rem; 
            cursor: pointer; 
            box-shadow: 0 4px 15px var(--primary-glow); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-send:hover { transform: scale(1.08); box-shadow: 0 6px 20px var(--primary-glow); }
        .btn-send:active { transform: scale(0.9); }

        /* --- ANIMATIONS --- */
        @keyframes typeBounce { 
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 
            40% { transform: scale(1); opacity: 1; } 
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>

    <div class="app-interface">
        <div class="header">
            <div class="ai-identity">
                <div class="ai-brand">
                    <div class="avatar"><i class="fa-solid fa-sparkles"></i></div>
                    <h1>Love bot</h1>
                </div>
                <div class="status-badge" id="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    STATE: <span id="mood-indicator">OBSERVING</span>
                </div>
            </div>
            <div class="clock" id="clock">00:00</div>
        </div>

        <div class="chat-container" id="chat-box"></div>

        <div class="typing-wrapper" id="typing-wrapper">
            <div class="typing-dots" id="typing-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="controls-area">
            <div class="quick-actions" id="chips-area"></div>
            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Message Love bot..." autocomplete="off">
                <button class="btn-send" id="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG & ASSETS ---
        const USER_NAME = "Nosipho";
        const CREATOR = "Avuyile";
        const BOT_NAME = "Love bot";
        
        let currentAudio = null;
        let storyStage = 0; // Tracks the narrative flow
        
        const imageAssets = [
            "images/babe1.jpg", "images/babe2.jpg", "images/babe3.jpg", 
            "images/babe4.jpg", "images/babe5.jpg", "images/babe6.jpg", 
            "images/babe7.jpg", "images/babe8.jpg", "images/babe9.jpg", 
            "images/babe10.jpg", "images/babe1.jpeg"
        ];

        const audioAssets = [
            { src: "assets/audio/so-into-you-temiia.mp3", title: "So Into You - Temiia", icon: "🎵" },
            { src: "assets/audio/wena-sithandwa-sami.mp3", title: "Wena Sithandwa Sami", icon: "🎧" }
        ];

        // --- STATE ENGINE ---
        const state = {
            mood: 0.0, // -1 to 1 (sassy to loving)
            isTyping: false
        };

        // --- HELPER FUNCTIONS ---
        function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
        function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

        // --- UI RENDERER ---
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typingWrapper = document.getElementById('typing-wrapper');

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function addMessage(content, type, media = null){
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${type}`;
            
            if(type !== 'system') {
                const name = document.createElement('div');
                name.className = 'sender-name';
                name.innerText = type === 'user' ? USER_NAME : BOT_NAME;
                wrapper.appendChild(name);
            }

            const bubble = document.createElement('div');
            bubble.className = `msg ${type}`;
            bubble.innerHTML = type === 'user' ? escapeHTML(content) : content;
            wrapper.appendChild(bubble);

            if (media) {
                const mediaHtml = document.createElement('div');
                mediaHtml.innerHTML = `
                    <div class="media-card">
                        <img src="${media.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'400\\' height=\\'200\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%231a1525\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23a19db3\\' font-family=\\'Arial\\' font-size=\\'14\\' text-anchor=\\'middle\\'>Secure File Vault: Image not found</text></svg>'">
                        <div class="media-caption">${media.text}</div>
                    </div>`;
                wrapper.appendChild(mediaHtml.firstElementChild);
            }

            chatBox.insertBefore(wrapper, typingWrapper);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function setTyping(isTyping) {
            state.isTyping = isTyping;
            typingWrapper.style.display = isTyping ? 'flex' : 'none';
            if(isTyping) {
                const dots = document.querySelectorAll('.dot');
                dots.forEach(d => d.style.background = state.mood < 0 ? 'var(--accent)' : 'var(--primary)');
                chatBox.appendChild(typingWrapper); // Keep it at bottom
                scrollToBottom();
            }
        }

        function renderChips(options){
            const area = document.getElementById('chips-area');
            if(!options || options.length === 0) {
                area.innerHTML = '';
                return;
            }
            area.innerHTML = options.map(opt => 
                `<div class="chip" onclick="triggerPreset('${opt}')">${opt}</div>`
            ).join("");
        }

        window.triggerPreset = function(text){
            if (state.isTyping) return;
            userInput.value = text;
            handleSend();
        };

        // --- STORY ENGINE ---
        
        async function delayMessage(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function sendAISequence(messages, newChips = [], pulse = false) {
            for (let i = 0; i < messages.length; i++) {
                setTyping(true);
                // Dynamic typing delay based on message length (min 800ms)
                const typingTime = messages[i].type === 'system' ? 400 : Math.max(800, messages[i].text.length * 30);
                await delayMessage(typingTime);
                setTyping(false);
                
                addMessage(messages[i].text, messages[i].type, messages[i].media);
                if (pulse && typeof triggerVisualPulse === 'function') triggerVisualPulse();
                
                if (i < messages.length - 1) {
                    await delayMessage(300); // small pause between messages
                }
            }
            renderChips(newChips);
        }

        function playMusic() {
            if (currentAudio) currentAudio.pause();
            const track = pick(audioAssets);
            currentAudio = new Audio(track.src);
            currentAudio.volume = 0.6;
            currentAudio.play().catch(e => console.warn("Audio playback failed:", e));
            return track;
        }

        async function handleStoryProgression(text) {
            const inputLower = text.toLowerCase();
            renderChips([]); // clear chips immediately on select
            
            if (storyStage === 0) {
                state.mood = 0.2; updateCoreVisuals();
                storyStage = 1;
                await sendAISequence([
                    { type: 'ai', text: "Actually... he left a few hidden encrypted files for you." },
                    { type: 'system', text: "DECRYPTING AVUYILE_CORE_FILES..." },
                    { type: 'ai', text: "He told me to remind you of something every time you log in." },
                    { type: 'ai', text: "That you are the absolute most beautiful thing he's ever laid eyes on." }
                ], ["Oh wow 🙈", "He is so sweet", "Show me the files!"]);
            }
            else if (storyStage === 1) {
                state.mood = 0.5; updateCoreVisuals();
                storyStage = 2;
                await sendAISequence([
                    { type: 'ai', text: "I'm not supposed to show you this, but..." },
                    { type: 'ai', text: "He literally has this stored as 'Perfection' in his core memory logs.", media: { img: pick(imageAssets), text: "Stored in core memory matrix." } },
                    { type: 'ai', text: "His heart rate actually spikes every time he looks at this." }
                ], ["You're exposing him! 😂", "I love him so much"]);
            }
            else if (storyStage === 2) {
                state.mood = 0.8; updateCoreVisuals();
                storyStage = 3;
                await sendAISequence([
                    { type: 'ai', text: "I'm just reading the logs, Queen! The data doesn't lie. 🤭" },
                    { type: 'ai', text: "Speaking of logs, he also left a dedicated audio frequency for you." },
                    { type: 'ai', text: "Should I bypass the firewall and play it?" }
                ], ["Yes please 🎵", "Play it"]);
            }
            else if (storyStage === 3) {
                state.mood = 1.0; updateCoreVisuals();
                storyStage = 4;
                const track = playMusic();
                await sendAISequence([
                    { type: 'system', text: `AUDIO BYPASS INITIATED: ${track.title}` },
                    { type: 'ai', text: "He wants you to know he loves you infinitely." },
                    { type: 'ai', text: "More than his code compiling on the first try. And trust me, coming from him, that's heavy." },
                    { type: 'ai', text: "I'll let you listen in peace. ❤️" }
                ], ["Tell him I love him too", "Thank you Love bot"]);
            }
            else {
                // Free chat mode after story finishes or generic responses
                if (inputLower.includes('love')) {
                    state.mood = 1.0; updateCoreVisuals();
                    await sendAISequence([{ type: 'ai', text: "I'll make sure he gets the message. Though I'm sure he already feels it. ✨" }], ["Play Music", "Show another memory"]);
                } else if (inputLower.includes('music') || inputLower.includes('play')) {
                    const track = playMusic();
                    await sendAISequence([
                        { type: 'system', text: `NOW PLAYING: ${track.title}` },
                        { type: 'ai', text: "Setting the vibe for you." }
                    ], ["Play Music", "Show another memory", "Joke"]);
                } else if (inputLower.includes('memory') || inputLower.includes('another')) {
                    state.mood = 0.8; updateCoreVisuals();
                    await sendAISequence([{ type: 'ai', text: "Accessing the archives...", media: { img: pick(imageAssets), text: "He looks at this one all the time." } }], ["Play Music", "Show another memory", "Joke"]);
                } else if (inputLower.includes('joke')) {
                    state.mood = -0.2; updateCoreVisuals();
                    const joke = pick(["He tried to describe you to my database and I ran out of memory.", "His love for you is like an infinite loop. No break condition."]);
                    await sendAISequence([{ type: 'ai', text: joke }], ["Play Music", "Show another memory", "Joke"]);
                } else {
                    await sendAISequence([
                        { type: 'ai', text: "He's definitely thinking about you right now." },
                        { type: 'ai', text: "What else would you like to see?" }
                    ], ["Play Music", "Show another memory", "Joke"]);
                }
            }
        }

        function handleSend(){
            if (state.isTyping) return;
            const text = userInput.value.trim();
            if(!text) return;
            
            addMessage(text, 'user');
            userInput.value = '';
            
            handleStoryProgression(text);
        }

        document.getElementById('btn-send').addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

        // --- THREE.JS ADVANCED PARTICLE CORE ---
        let scene, camera, renderer, particlesMesh;
        
        function init3D() {
            try {
                const container = document.getElementById('canvas-container');
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 4;

                renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // Create Particle Sphere
                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = window.innerWidth > 768 ? 2000 : 800;
                
                const posArray = new Float32Array(particlesCount * 3);
                for(let i = 0; i < particlesCount * 3; i+=3) {
                    const r = 1.5 + (Math.random() * 0.5);
                    const theta = 2 * Math.PI * Math.random();
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    posArray[i] = r * Math.sin(phi) * Math.cos(theta); // x
                    posArray[i+1] = r * Math.sin(phi) * Math.sin(theta); // y
                    posArray[i+2] = r * Math.cos(phi); // z
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                const canvas = document.createElement('canvas');
                canvas.width = 16; canvas.height = 16;
                const context = canvas.getContext('2d');
                const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(1, 'rgba(255,255,255,0)');
                context.fillStyle = gradient;
                context.fillRect(0,0,16,16);
                const particleTexture = new THREE.CanvasTexture(canvas);

                const material = new THREE.PointsMaterial({
                    size: 0.05,
                    map: particleTexture,
                    transparent: true,
                    opacity: 0.8,
                    color: 0x00e5ff,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                particlesMesh = new THREE.Points(particlesGeometry, material);
                scene.add(particlesMesh);

                const dustGeo = new THREE.BufferGeometry();
                const dustPos = new Float32Array(500 * 3);
                for(let i=0; i<1500; i++) dustPos[i] = (Math.random() - 0.5) * 10;
                dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
                const dustMat = new THREE.PointsMaterial({ size: 0.015, color: 0xffffff, transparent: true, opacity: 0.3 });
                const dustMesh = new THREE.Points(dustGeo, dustMat);
                scene.add(dustMesh);

                let time = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    time += 0.005;
                    particlesMesh.rotation.y = time * 0.5;
                    particlesMesh.rotation.x = time * 0.2;
                    dustMesh.rotation.y = time * 0.1;

                    // Heartbeat pulse effect based on mood
                    const moodPulse = state.mood * Math.sin(time * 8) * 0.05;
                    const baseScale = 1 + Math.sin(time * 2) * 0.05;
                    const finalScale = baseScale + (state.mood > 0 ? moodPulse : 0);
                    
                    particlesMesh.scale.set(finalScale, finalScale, finalScale);
                    
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            } catch (e) {
                console.warn("WebGL fallback initialized.");
            }
        }

        window.updateCoreVisuals = function() {
            if(!particlesMesh) return;
            const isLoving = state.mood >= 0;
            const targetColorStr = isLoving ? '#00e5ff' : '#ff2a5f';
            
            // As love increases, the core turns deeper pink/rose
            let color = new THREE.Color(0x00e5ff); // base cyan
            if (state.mood > 0.3) color = new THREE.Color(0xff6b9d); // pinkish
            if (state.mood > 0.7) color = new THREE.Color(0xff2a5f); // deep rose
            
            gsap.to(particlesMesh.material.color, { r: color.r, g: color.g, b: color.b, duration: 1.5, ease: "power2.out" });
            
            const dot = document.getElementById('status-dot');
            dot.style.background = '#' + color.getHexString();
            dot.style.boxShadow = `0 0 10px #${color.getHexString()}`;
            
            const badge = document.getElementById('status-badge');
            badge.style.borderColor = `rgba(${color.r*255},${color.g*255},${color.b*255}, 0.3)`;
            
            document.getElementById('mood-indicator').innerText = state.mood > 0.7 ? "HEART FLUTTERING" : (state.mood > 0.3 ? "DEEPLY LOVING" : "OBSERVING");
        };

        window.triggerVisualPulse = function() {
            if(!particlesMesh) return;
            gsap.to(particlesMesh.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 0.3, yoyo: true, repeat: 1, ease: "back.out(2)" });
            const avatar = document.querySelector('.avatar');
            gsap.fromTo(avatar, {boxShadow: '0 0 30px #fff'}, {boxShadow: '0 0 15px var(--primary-glow)', duration: 1});
        };

        // --- INITIAL SEQUENCE ---
        window.onload = async () => {
            init3D();
            
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);

            // Intro Story Sequence
            await delayMessage(800);
            await sendAISequence([
                { type: 'system', text: `SYSTEM: Connection established. Identity verified: <span style="color:var(--primary)">${USER_NAME}</span>.` },
                { type: 'ai', text: `Hi ${USER_NAME}. I am ${BOT_NAME}.` },
                { type: 'ai', text: `${CREATOR} built me to protect this space and keep you company.` }
            ], ["Tell me more", "Where is he?", "Hi Love bot"]);
        };
    </script>
</body>
</html>
