<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT: NGELOSI | ALIVE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #00f3ff;
            --accent: #ff0055;
            --bg: #050510;
            --font-main: 'Outfit', sans-serif;
            --font-tech: 'Space Mono', monospace;
            --glass-panel: rgba(10, 15, 30, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: var(--font-main);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND FALLBACK & 3D --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }
        
        .fallback-bg {
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg) 100%);
            animation: pulseBg 6s infinite alternate;
        }

        /* --- UI LAYER --- */
        .app-interface {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(0,0,0,0.01);
        }

        /* HEADER */
        .header {
            padding: max(50px, env(safe-area-inset-top)) 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,16,0.95), transparent);
        }
        .ai-identity h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .status-dot { width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; animation: blink 3s infinite; }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Clean look */
        }
        .chat-container::-webkit-scrollbar { display: none; }

        /* BUBBLES */
        .msg {
            max-width: 85%;
            padding: 14px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            backdrop-filter: blur(5px);
            word-wrap: break-word;
        }
        
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(255, 0, 85, 0.8), rgba(255, 51, 119, 0.8));
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .msg.ai { align-self: flex-start; color: #e0faff; background: rgba(10, 20, 30, 0.7); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 18px 18px 18px 4px; }
        .msg.ai strong { color: var(--primary); }
        
        .msg.ai.system { 
            align-self: center; font-size: 0.75rem; background: rgba(0,243,255,.08); 
            border: 1px dashed rgba(0,243,255,.25); font-family: var(--font-tech); 
            border-radius: 8px; padding: 8px 12px; text-transform: uppercase; letter-spacing: 1px;
        }

        .micro { opacity:.7; font-size:.75rem; font-family: var(--font-tech); display: block; margin-bottom: 4px; }

        /* TYPING INDICATOR */
        .typing-wrapper { align-self: flex-start; display: none; margin-bottom: 10px; }
        .typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; animation: typeBounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .typing-dots.dramatic .dot { background: var(--accent); width: 6px; height: 6px; }

        /* CONTROLS */
        .controls-area {
            background: var(--glass-panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column; gap: 12px;
        }

        .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .quick-actions::-webkit-scrollbar { display: none; }
        
        .chip {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 14px; border-radius: 30px; font-size: 0.75rem; white-space: nowrap;
            color: #ccc; transition: 0.2s; font-family: var(--font-tech); cursor: pointer;
        }
        .chip:active { background: var(--primary); color: #000; transform: scale(0.95); }

        .input-bar { display: flex; gap: 10px; align-items: center; position: relative; }
        
        input {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px; border-radius: 30px; color: white; font-family: var(--font-main);
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input::placeholder { color: rgba(255,255,255,0.4); font-style: italic; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,243,255,0.1); background: rgba(0,0,0,0.6); }

        .btn-send {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: var(--primary); color: #000; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 10px rgba(0,243,255,0.4); transition: transform 0.2s;
        }
        .btn-send:active { transform: scale(0.9); }

        /* MEDIA CARDS */
        .media-card { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .media-card img { width: 100%; display: block; object-fit: cover; max-height: 250px; }
        .media-caption { padding: 10px; background: rgba(0,0,0,0.8); font-size: 0.8rem; color: #ddd; }

        @keyframes typeBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulseBg { 0% { background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg) 100%); } 100% { background: radial-gradient(circle at center, #2d0b2e 0%, var(--bg) 100%); } }

    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="app-interface">
        <div class="header">
            <div class="ai-identity">
                <div style="display:flex; align-items:center; gap:10px;">
                    <h1>Ngelosi</h1>
                    <div class="status-dot" id="status-dot"></div>
                </div>
                <div style="font-size:0.65rem; color:#888; font-family:var(--font-tech); margin-top:2px;">
                    STATE: <span id="mood-indicator">OBSERVING</span>
                </div>
            </div>
            <div style="font-family:var(--font-tech); color:var(--primary); font-size:0.8rem;" id="clock">00:00</div>
        </div>

        <div class="chat-container" id="chat-box"></div>

        <div class="typing-wrapper" id="typing-wrapper">
            <div class="typing-dots" id="typing-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="controls-area">
            <div class="quick-actions" id="chips-area"></div>
            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Ask Ngelosi..." autocomplete="off">
                <button class="btn-send" id="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG & ASSETS ---
        const USER_NAME = "Nosipho";
        const CREATOR = "Avuyile";
        const BOT_NAME = "Ngelosi";
        
        let currentAudio = null;
        
        // Dynamically mapping the assets you provided
        const imageAssets = [
            "images/babe1.jpg", "images/babe2.jpg", "images/babe3.jpg", 
            "images/babe4.jpg", "images/babe5.jpg", "images/babe6.jpg", 
            "images/babe7.jpg", "images/babe8.jpg", "images/babe9.jpg", 
            "images/babe10.jpg", "images/babe1.jpeg"
        ];

        const audioAssets = [
            { src: "assets/audio/so-into-you-temiia.mp3", title: "So Into You - Temiia" },
            { src: "assets/audio/wena-sithandwa-sami.mp3", title: "Wena Sithandwa Sami" }
        ];

        const memoryTexts = [
            "He looks at this one all the time.",
            "Stored in his core memory matrix.",
            "Avuyile told me to guard this file with my life.",
            "Analyzing his biometrics when he sees this... heart rate: elevated.",
            "You two really are something else."
        ];

        // --- STATE ENGINE ---
        const state = {
            mood: 0.0,
            streak: 0,
            lastIntent: null
        };

        const flair = {
            openers: ["Mm.", "Okay Queen.", "Scanning logs...", "One sec.", "Eish.", "I hear you."],
            closers: ["Want the honest version?", "Should I pull receipts?", "Don't say I didn't warn you."],
            sass: ["Not you acting surprised 😭", "You know what you're doing.", "Be serious… 😌", "Bombastic side eye."]
        };

        // --- HELPER FUNCTIONS ---
        function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
        function chance(p){ return Math.random() < p; }
        function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

        // --- LOGIC ENGINE ---
        function detectIntent(text){
            const lower = text.toLowerCase();
            if(/music|song|play|listen|audio/.test(lower)) return "music";
            if(/memory|photo|picture|remember|babe/.test(lower)) return "memory";
            if(/joke|funny|laugh/.test(lower)) return "joke";
            if(/miss|sad|lonely/.test(lower)) return "miss";
            if(/love|how much|infinity/.test(lower)) return "love";
            if(/hi|hello|hey/.test(lower)) return "greet";
            return "default";
        }

        function playMusic() {
            if (currentAudio) currentAudio.pause();
            const track = pick(audioAssets);
            currentAudio = new Audio(track.src);
            currentAudio.volume = 0.6;
            
            // Robust handling for autoplay policies
            currentAudio.play().catch(e => {
                console.warn("Audio playback failed (check file path or browser policies):", e);
                addMessage(`<em>System Note: Could not load ${track.title}. Ensure the 'assets' folder is correct.</em>`, 'ai', true);
            });
            return track.title;
        }

        function generateResponse(input){
            const intent = detectIntent(input);
            let responseText = "";
            let media = null;
            let action = null;

            state.mood = (intent === "miss" || intent === "love" || intent === "memory") ? clamp(state.mood + 0.2, -1, 1) : 
                         (intent === "default" ? clamp(state.mood - 0.1, -1, 1) : state.mood);
            updateCoreColor();

            if(intent === "music"){
                const trackName = playMusic();
                responseText = `Initializing audio bypass. Playing his dedicated track for you: <strong>${trackName}</strong>.`;
                action = "pulse";
            } else if(intent === "memory"){
                media = { img: pick(imageAssets), text: pick(memoryTexts) };
                responseText = `Decrypting personal archives... Match found.`;
            } else if (intent === "joke") {
                responseText = pick([
                    `${CREATOR} loves you more than his code compiling on the first try. That's serious.`,
                    `He tried to describe you to my database and I ran out of memory.`
                ]);
            } else if (intent === "miss") {
                responseText = `Checking ${CREATOR}'s vitals... Heart rate spiking. Yeah, he misses you like crazy.`;
                action = "pulse";
            } else if (intent === "love") {
                responseText = `If his love for you was code, the loop would have no 'break' condition.`;
                action = "pulse";
            } else if (intent === "greet") {
                responseText = `Hello ${USER_NAME}. Systems operational. ${CREATOR} left me here to keep you company.`;
            } else {
                responseText = pick([
                    "Tell me what you want to see. I have photos, his favorite songs for you, and receipts.",
                    "Give me a command, Queen.",
                    "He's definitely thinking about you right now."
                ]);
            }

            return { text: responseText, media: media, action: action, intent: intent };
        }

        // --- UI RENDERER ---
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function addMessage(content, sender, isSystem=false){
            const div = document.createElement('div');
            div.className = `msg ${sender} ${isSystem ? 'system' : ''}`;
            
            // If user, escape to prevent HTML injection. If AI, allow strong/em tags safely generated by our logic.
            div.innerHTML = sender === 'user' ? escapeHTML(content) : content;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderChips(intent){
            const area = document.getElementById('chips-area');
            const options = ["🎵 Play Music", "📸 Show Memory", "🥺 Does he miss me?", "❤️ How much?", "😜 Joke"];
            
            // Shuffle and pick 3
            const shuffled = options.sort(() => 0.5 - Math.random()).slice(0, 3);
            
            area.innerHTML = shuffled.map(lbl => {
                const command = lbl.replace(/[🎵📸🥺❤️😜]/g, '').trim();
                return `<div class="chip" onclick="triggerPreset('${command}')">${lbl}</div>`;
            }).join("");
        }

        window.triggerPreset = function(text){
            userInput.value = text;
            handleSend();
        };

        function handleSend(){
            const text = userInput.value.trim();
            if(!text) return;
            
            addMessage(text, 'user');
            userInput.value = '';

            const el = document.getElementById('typing-wrapper');
            el.style.display = 'flex';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const resp = generateResponse(text);
                el.style.display = 'none';
                
                addMessage(resp.text, 'ai');
                
                if(resp.media){
                    // Added onerror to handle missing images gracefully
                    const mediaHtml = `
                        <div class="media-card">
                            <img src="${resp.media.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'400\\' height=\\'200\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23222\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23777\\' text-anchor=\\'middle\\'>Image not found</text></svg>'">
                            <div class="media-caption">${resp.media.text}</div>
                        </div>`;
                    addMessage(mediaHtml, 'ai');
                }

                renderChips(resp.intent);
                if(resp.action === 'pulse' && typeof triggerPulse === 'function') triggerPulse();
                
            }, 800 + Math.random() * 600);
        }

        // Bind Enter Key & Send Button
        document.getElementById('btn-send').addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

        // --- ROBUST 3D VISUALS ---
        let scene, camera, renderer, core;
        
        function init3D() {
            try {
                const container = document.getElementById('canvas-container');
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Perf optimization
                container.appendChild(renderer.domElement);

                const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 100, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true, transparent: true, opacity: 0.3 });
                core = new THREE.Mesh(geometry, material);
                scene.add(core);

                function animate() {
                    requestAnimationFrame(animate);
                    core.rotation.x += 0.003 + (state.mood * 0.005);
                    core.rotation.y += 0.004 + (state.mood * 0.005);
                    renderer.render(scene, camera);
                }
                animate();

                // Robust resize handler
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            } catch (e) {
                console.warn("WebGL not supported or failed. Falling back to CSS animation.");
                document.getElementById('canvas-container').classList.add('fallback-bg');
            }
        }

        window.updateCoreColor = function() {
            if(!core) return;
            const target = state.mood < 0 ? 0xff0055 : 0x00f3ff;
            gsap.to(core.material.color, { r: new THREE.Color(target).r, g: new THREE.Color(target).g, b: new THREE.Color(target).b, duration: 1 });
            
            const dot = document.getElementById('status-dot');
            dot.style.background = state.mood < 0 ? '#ff0055' : '#0f0';
            dot.style.boxShadow = `0 0 8px ${state.mood < 0 ? '#ff0055' : '#0f0'}`;
            document.getElementById('mood-indicator').innerText = state.mood < 0 ? "SASSY" : (state.mood > 0.5 ? "LOVING" : "OBSERVING");
        };

        window.triggerPulse = function() {
            if(!core) return;
            gsap.to(core.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 0.2, yoyo: true, repeat: 1 });
        };

        // --- INITIALIZATION ---
        window.onload = () => {
            init3D();
            renderChips('default');
            
            setTimeout(() => {
                addMessage(`System initialized.<br>Identity: <strong>${BOT_NAME}</strong>.<br>Primary Directive: Protect ${USER_NAME}.`, 'ai', true);
            }, 600);

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        };
    </script>
</body>
</html>
