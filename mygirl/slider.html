<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Moments Carousel</title>

  <style>
    :root{
      --primary:#ff4d6d;
      --secondary:#ff8fa3;
      --text:#ffffff;
      --bg1:#0f0f14;
      --bg2:#1a0f18;
      --glass: rgba(255,255,255,0.06);
      --glassBorder: rgba(255,255,255,0.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,77,109,0.20), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,143,163,0.14), transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-x:hidden;
    }

    .card{
      width:min(1000px, 100%);
      border-radius:32px;
      background: var(--glass);
      border:1px solid var(--glassBorder);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding:30px;
      position:relative;
      overflow:hidden;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:16px;
    }

    h1{
      margin:0;
      font-size:clamp(24px, 4vw, 32px);
      background: linear-gradient(to right, #fff, var(--secondary));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      margin:8px 0 0;
      color: rgba(255,255,255,0.62);
      font-size:14px;
    }

    .carousel-wrapper{
      position:relative;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:34px 0 8px;
      user-select:none;
      touch-action: pan-y;
    }

    .carousel-container{
      perspective: 1200px;
      width:100%;
      height:380px;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .carousel{
      width:220px;
      height:300px;
      position:relative;
      transform-style:preserve-3d;
      transition: transform 0.85s cubic-bezier(0.25,0.1,0.25,1);
      will-change: transform;
    }

    .carousel-item{
      position:absolute;
      width:220px;
      height:300px;
      border-radius:20px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,0.20);
      box-shadow: 0 10px 30px rgba(0,0,0,0.55);
      background:#000;
      transform-style:preserve-3d;
      transition: transform 0.85s cubic-bezier(0.25,0.1,0.25,1), box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .carousel-item img,
    .carousel-item video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .carousel-item::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), transparent 55%);
      pointer-events:none;
      opacity:0.8;
    }

    .carousel-item.is-active{
      border-color: rgba(255,255,255,0.55);
      box-shadow: 0 16px 40px rgba(0,0,0,0.70);
    }

    .nav-arrow{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:50px;
      height:50px;
      border-radius:50%;
      background: rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.18);
      color:#fff;
      font-size:20px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:10;
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .nav-arrow:hover{
      background: var(--primary);
      box-shadow: 0 0 18px rgba(255,77,109,0.45);
    }
    .nav-arrow.left{ left:-10px; }
    .nav-arrow.right{ right:-10px; }

    .hint{
      text-align:center;
      color: rgba(255,255,255,0.42);
      font-size:13px;
      margin-top:16px;
    }

    /* Loading overlay */
    .loader{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index:50;
    }
    .spinner{
      width:46px;
      height:46px;
      border-radius:50%;
      border: 3px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.85);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
    .loader small{ color: rgba(255,255,255,0.65); }

    /* Music controls */
    #music-controls{
      position:fixed;
      bottom:30px;
      right:30px;
      background: rgba(0,0,0,0.42);
      padding:10px 18px;
      border-radius:30px;
      border:1px solid var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index:100;
    }
    .dot{ width:8px; height:8px; background:#555; border-radius:50%; }
    .playing .dot{ background:var(--primary); box-shadow:0 0 10px var(--primary); }
    #music-text{ font-size:13px; color: rgba(255,255,255,0.9); }

    @media (max-width: 600px){
      .nav-arrow{ width:40px; height:40px; }
      .nav-arrow.left{ left:0px; }
      .nav-arrow.right{ right:0px; }
      .card{ padding:20px; border-radius:24px; }
      .carousel-container{ height:340px; }
    }
  </style>
</head>

<body>

  <!-- Audio File: Replace 'your-romantic-song.mp3' with a real file in your folder -->
    <audio id="bg-music" loop preload="auto">
        <source src="assets/audio/so-into-you-temiia.mp3" type="audio/mpeg">
    </audio>

  <div class="card">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <small id="loader-text">Loading your moments…</small>
    </div>

    <header>
      <div>
        <h1>My queen</h1>
        <p>The woman who stole my heart</p>
      </div>
      <!-- Optional: you can remove this button entirely; slideshow auto-starts -->
      <button class="nav-arrow" style="position:static; transform:none; width:auto; height:auto; border-radius:14px; padding:10px 14px;"
              id="pause-btn" aria-label="Pause autoplay">Pause</button>
    </header>

    <div class="carousel-wrapper" id="drag-surface">
      <button class="nav-arrow left" id="prev-btn" aria-label="Previous">❮</button>

      <div class="carousel-container">
        <div class="carousel" id="main-carousel"></div>
      </div>

      <button class="nav-arrow right" id="next-btn" aria-label="Next">❯</button>
    </div>

    <div class="hint" id="hint">Auto-playing… use arrows, drag, or keyboard</div>
  </div>

  <div id="music-controls" role="button" aria-label="Toggle music">
    <div class="dot"></div>
    <div id="music-text">Music Off</div>
  </div>

  <script>
    // These are real files (images/videos).mp4 for videos.
    const mediaItems = [
      { src: 'images/babe1.jpeg' },
      { src: 'videos/video (1).mp4' },
      { src: 'images/babe1.jpg' },
      { src: 'videos/video (1) (2).mp4' },
      { src: 'images/babe2.jpg' },
      { src: 'videos/video (1) (3).mp4' },
      { src: 'images/babe3.jpg' },
      { src: 'videos/video (1) (4).mp4' },
      { src: 'images/babe4.jpg' },
      { src: 'videos/video (1) (5).mp4' }
    ];

    // Config
    const SLIDE_MS = 5000;          // each item shows ~5 seconds
    const START_DELAY_MS = 1200;    // "loads a few seconds" vibe (plus preload)

    // Elements
    const carousel = document.getElementById('main-carousel');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');
    const hint = document.getElementById('hint');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const dragSurface = document.getElementById('drag-surface');

    // State
    let angleStep = 0;
    let radius = 0;
    let currentIndex = 0;
    let currentRotation = 0;
    let autoplayTimer = null;
    let isPaused = false;
    let isReady = false;

    // Helpers
    function isVideoSrc(src){
      return /\.(mp4|webm|ogg)(\?.*)?$/i.test(src);
    }

    function clampIndex(i){
      const n = mediaItems.length;
      return (i % n + n) % n;
    }

    function setLoader(msg){
      loaderText.textContent = msg;
    }

    // Preload media (lightweight)
    function preloadAll(items){
      const promises = items.map((item, idx) => {
        const src = item.src;
        if (isVideoSrc(src)){
          return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.muted = true;
            v.playsInline = true;
            v.src = src;
            const done = () => resolve();
            v.addEventListener('loadedmetadata', done, { once:true });
            v.addEventListener('error', done, { once:true }); // don't block on errors
          });
        } else {
          return new Promise((resolve) => {
            const img = new Image();
            img.src = src;
            img.onload = () => resolve();
            img.onerror = () => resolve();
          });
        }
      });

      return Promise.all(promises);
    }

    function buildCarousel(){
      carousel.innerHTML = "";
      angleStep = 360 / mediaItems.length;

      // ring radius tuned for the card size
      radius = Math.round((220 / 2) / Math.tan(Math.PI / mediaItems.length)) + 40;

      mediaItems.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'carousel-item';
        div.style.transform = `rotateY(${i * angleStep}deg) translateZ(${radius}px)`;

        const src = item.src;
        if (isVideoSrc(src)){
          const v = document.createElement('video');
          v.src = src;
          v.muted = true;
          v.loop = false;
          v.playsInline = true;
          v.preload = 'metadata';
          v.controls = false;
          div.appendChild(v);
        } else {
          const img = document.createElement('img');
          img.src = src;
          img.alt = "Memory";
          div.appendChild(img);
        }

        div.addEventListener('click', () => {
          goToIndex(i, { user:true });
        });

        carousel.appendChild(div);
      });
    }

    function updateActiveStyles(){
      const items = carousel.querySelectorAll('.carousel-item');
      items.forEach((el, i) => {
        el.classList.toggle('is-active', i === currentIndex);
      });
    }

    function pauseAllVideos(){
      const videos = carousel.querySelectorAll('video');
      videos.forEach(v => {
        try { v.pause(); } catch(e){}
      });
    }

    function playActiveVideoIfAny(){
      const activeItem = carousel.querySelectorAll('.carousel-item')[currentIndex];
      if (!activeItem) return;

      const v = activeItem.querySelector('video');
      if (!v) return;

      // Only play the active one
      try {
        v.currentTime = 0;
        const p = v.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      } catch(e){}
    }

    function applyRotation(){
      currentRotation = -(currentIndex * angleStep);
      carousel.style.transform = `rotateY(${currentRotation}deg)`;
      updateActiveStyles();
    }

    function scheduleNext(){
      clearTimeout(autoplayTimer);
      if (isPaused) return;

      autoplayTimer = setTimeout(() => {
        goToIndex(currentIndex + 1, { user:false });
      }, SLIDE_MS);
    }

    function goToIndex(index, { user }){
      if (!isReady) return;

      currentIndex = clampIndex(index);
      pauseAllVideos();
      applyRotation();
      playActiveVideoIfAny();

      // If user navigates manually, keep autoplay going (feels smooth)
      scheduleNext();

      if (user) {
        hint.textContent = "Nice 😌 keep exploring — autoplay continues";
      }
    }

    function startAutoplay(){
      isPaused = false;
      pauseBtn.textContent = "Pause";
      goToIndex(currentIndex, { user:false });
    }

    function togglePause(){
      if (!isReady) return;
      isPaused = !isPaused;
      if (isPaused){
        clearTimeout(autoplayTimer);
        pauseAllVideos();
        pauseBtn.textContent = "Play";
        hint.textContent = "Paused — use arrows/drag to browse";
      } else {
        pauseBtn.textContent = "Pause";
        hint.textContent = "Auto-playing… use arrows, drag, or keyboard";
        playActiveVideoIfAny();
        scheduleNext();
      }
    }

    // Controls
    prevBtn.addEventListener('click', () => goToIndex(currentIndex - 1, { user:true }));
    nextBtn.addEventListener('click', () => goToIndex(currentIndex + 1, { user:true }));
    pauseBtn.addEventListener('click', togglePause);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goToIndex(currentIndex - 1, { user:true });
      if (e.key === 'ArrowRight') goToIndex(currentIndex + 1, { user:true });
      if (e.key === ' ') { e.preventDefault(); togglePause(); }
    });

    // Drag / swipe navigation
    (function enableDrag(){
      let dragging = false;
      let startX = 0;
      let lastX = 0;

      function onDown(x){
        dragging = true;
        startX = x;
        lastX = x;
      }

      function onMove(x){
        if (!dragging) return;
        lastX = x;
      }

      function onUp(){
        if (!dragging) return;
        dragging = false;
        const dx = lastX - startX;
        const threshold = 35;
        if (Math.abs(dx) > threshold){
          if (dx > 0) goToIndex(currentIndex - 1, { user:true });
          else goToIndex(currentIndex + 1, { user:true });
        }
      }

      dragSurface.addEventListener('mousedown', (e) => onDown(e.clientX));
      window.addEventListener('mousemove', (e) => onMove(e.clientX));
      window.addEventListener('mouseup', onUp);

      dragSurface.addEventListener('touchstart', (e) => onDown(e.touches[0].clientX), { passive:true });
      dragSurface.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX), { passive:true });
      dragSurface.addEventListener('touchend', onUp);
    })();

    // Music (autoplay will usually be blocked; we try, then enable via user interaction)
    const music = document.getElementById('bg-music');
    const musicControls = document.getElementById('music-controls');
    const musicText = document.getElementById('music-text');

    function setMusicUI(on){
      musicControls.classList.toggle('playing', on);
      musicText.textContent = on ? "Music On" : "Music Off";
    }

    async function tryPlayMusic(){
      try {
        await music.play();
        setMusicUI(true);
      } catch {
        // blocked until user gesture
        setMusicUI(false);
      }
    }

    musicControls.addEventListener('click', async () => {
      if (music.paused){
        await tryPlayMusic();
      } else {
        music.pause();
        setMusicUI(false);
      }
    });

    // If user clicks anywhere, try enabling music once
    window.addEventListener('pointerdown', () => {
      if (music.paused) tryPlayMusic();
    }, { once:true });

    // Boot
    (async function init(){
      setLoader("Loading your moments…");
      await preloadAll(mediaItems);
      setLoader("Almost there…");

      // build UI
      buildCarousel();

      // "loads a few seconds" vibe
      await new Promise(r => setTimeout(r, START_DELAY_MS));

      loader.style.display = "none";
      isReady = true;

      // start slideshow automatically
      startAutoplay();

      // attempt music (may be blocked)
      tryPlayMusic();
    })();
  </script>
</body>
</html>
