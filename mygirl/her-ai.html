<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT: NGELOSI | ALIVE</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #00f3ff;
            --accent: #ff0055;
            --bg: #050510;
            --font-main: 'Outfit', sans-serif;
            --font-tech: 'Space Mono', monospace;
            --glass-panel: rgba(10, 15, 30, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: var(--font-main);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 3D BACKGROUND (ALIVE CORE) --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            z-index: 0;
            opacity: 0.6; /* Slight dim so text is readable */
            pointer-events: none; /* Let clicks pass through */
        }

        /* --- UI LAYER --- */
        .app-interface {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(0,0,0,0.01); /* Mostly transparent */
        }

        /* HEADER */
        .header {
            padding: 50px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,16,0.9), transparent);
        }
        .ai-identity h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .ai-identity span { color: var(--primary); font-weight: 700; }
        .status-dot { width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; animation: blink 3s infinite; }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        /* DYNAMIC BUBBLE THEMES */
        .msg {
            max-width: 85%;
            padding: 14px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
        }
        
        /* User Bubble */
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(255, 0, 85, 0.8), rgba(255, 51, 119, 0.8));
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* AI Bubbles - Dynamic Themes */
        .msg.ai { align-self: flex-start; color: #e0faff; }
        .msg.ai strong { color: var(--primary); }
        
        .msg.ai.theme-0 { 
            background: rgba(10, 20, 30, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 18px 18px 18px 4px; 
        }
        
        .msg.ai.theme-1 { 
            background: rgba(0, 243, 255, 0.05);
            border-radius: 24px; 
            box-shadow: 0 0 15px rgba(0,243,255,0.08); 
            border: 1px solid rgba(0, 243, 255, 0.1);
        }
        
        .msg.ai.theme-2 { 
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px 22px 22px 22px; 
            border-left: 3px solid var(--primary);
        }

        .msg.ai.system { 
            align-self: center;
            font-size: 0.75rem;
            background: rgba(0,243,255,.08); 
            border: 1px dashed rgba(0,243,255,.25); 
            font-family: var(--font-tech); 
            border-radius: 8px;
            padding: 8px 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .micro { opacity:.7; font-size:.75rem; font-family: var(--font-tech); display: block; margin-bottom: 4px; }

        /* TYPING */
        .typing-wrapper { align-self: flex-start; display: none; margin-bottom: 10px; }
        .typing-dots {
            display: flex; gap: 4px; padding: 12px 16px;
            background: rgba(0,0,0,0.5); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; animation: typeBounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        /* Dramatic Typing Mode */
        .typing-dots.dramatic .dot { background: var(--accent); width: 6px; height: 6px; }
        .typing-dots.scan .dot { background: #fff; animation: scanAnim 1s infinite; border-radius: 0; width: 4px; height: 8px; }

        /* INPUT AREA */
        .controls-area {
            background: var(--glass-panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Chips */
        .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            white-space: nowrap;
            color: #ccc;
            transition: 0.2s;
            font-family: var(--font-tech);
        }
        .chip:active { background: var(--primary); color: #000; transform: scale(0.95); }

        /* Input Bar */
        .input-bar { display: flex; gap: 10px; align-items: center; position: relative; }
        
        input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 30px;
            color: white;
            font-family: var(--font-main);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input::placeholder { color: rgba(255,255,255,0.4); font-style: italic; transition: opacity 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,243,255,0.1); background: rgba(0,0,0,0.6); }

        .btn-send {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,243,255,0.4);
            transition: transform 0.2s;
        }
        .btn-send:active { transform: scale(0.9); }

        /* MEDIA CARD */
        .media-card { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .media-card img { width: 100%; display: block; }
        .media-caption { padding: 10px; background: rgba(0,0,0,0.8); font-size: 0.8rem; color: #ddd; }

        @keyframes typeBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scanAnim { 0% { opacity: 0.2; height: 4px; } 50% { opacity: 1; height: 12px; } 100% { opacity: 0.2; height: 4px; } }
        @keyframes blink { 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <!-- 3D Background (Centered visually) -->
    <div id="canvas-container"></div>

    <div class="app-interface">
        <div class="header">
            <div class="ai-identity">
                <div style="display:flex; align-items:center; gap:10px;">
                    <h1>Ngelosi</h1>
                    <div class="status-dot"></div>
                </div>
                <div style="font-size:0.65rem; color:#888; font-family:var(--font-tech); margin-top:2px;">
                    STATE: <span id="mood-indicator">NEUTRAL</span>
                </div>
            </div>
            <div style="font-family:var(--font-tech); color:var(--primary); font-size:0.8rem;" id="clock">00:00</div>
        </div>

        <div class="chat-container" id="chat-box"></div>

        <div class="typing-wrapper" id="typing-wrapper">
            <div class="typing-dots" id="typing-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="controls-area">
            <div class="quick-actions" id="chips-area">
                <!-- Chips injected by JS -->
            </div>
            
            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Ask Ngelosi..." autocomplete="off">
                <button class="btn-send" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & DATA ---
        const USER_NAME = "MaMdunge";
        const BOT_NAME = "Ngelosi";
        
        // --- 2. STATE ENGINE ---
        const state = {
            mood: 0.0,       // -1 (sassy/annoyed) to +1 (happy/soft)
            trust: 0.5,      // 0 to 1
            lastIntent: null,
            streak: 0,
            lastPlaceholderAt: 0,
            uiTheme: 0,
            seenMemories: new Set()
        };

        const flair = {
            openers: ["Mm.", "Okay okay.", "Wait—", "Scanning logs...", "One sec, Queen.", "Eish.", "I hear you.", "Say less."],
            closers: ["Want the soft version or the honest version?", "Should I pull receipts?", "Pick: 😈 spicy or 🥺 sweet?", "Ask again later.", "Don't say I didn't warn you."],
            sass: ["Not you acting surprised 😭", "You know what you’re doing.", "Be serious… 😌", "Don’t play with me.", "Bombastic side eye."]
        };

        const memories = [
            { id: 1, title: "The First Date", img: "https://images.unsplash.com/photo-1517604931442-71053e3e2c3c?auto=format&fit=crop&w=600&q=80", text: "He was so nervous he almost dropped his keys. Cute." },
            { id: 2, title: "Late Night Drive", img: "https://images.unsplash.com/photo-1493238792000-8113da705763?auto=format&fit=crop&w=600&q=80", text: "Playing Drake at 2AM. He looked at you more than the road." },
            { id: 3, title: "Beach Day", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80", text: "The wind was messy, but he said you looked like art." }
        ];

        // --- 3. HELPER FUNCTIONS ---
        function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
        function chance(p){ return Math.random() < p; }
        function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
        
        function pickWeighted(items){
            const sum = items.reduce((s,i)=>s+i.w,0);
            let r = Math.random()*sum;
            for(const i of items){ r -= i.w; if(r<=0) return i.v; }
            return items[items.length-1].v;
        }

        // --- 4. FLAVOR TEXT GENERATOR ---
        function wrapFlair(text, intent){
            // Adjust probability based on mood
            const isSassy = state.mood < -0.3;
            const isHappy = state.mood > 0.3;
            
            const addOpen = chance(isSassy ? 0.5 : 0.25);
            const addSass = chance(clamp((state.mood * -1), 0.05, 0.4)); 
            const addClose = chance(0.2);

            let opener = addOpen ? `<span class="micro">${pick(flair.openers)}</span>` : "";
            let sassLine = addSass ? `<span class="micro" style="color:var(--accent)">${pick(flair.sass)}</span>` : "";
            let closer = addClose ? `<br><br><span class="micro">${pick(flair.closers)}</span>` : "";

            // Don't add fluff to system messages or serious memories
            if(intent === "memory" || intent === "system") return text;

            return `${opener}${sassLine}${text}${closer}`;
        }

        function nextAiTheme(){
            // Logic to rotate themes or stick to one based on streak
            if(state.streak > 2) return `theme-${state.uiTheme}`; // Consistent during streak
            
            if(chance(0.3)) state.uiTheme = (state.uiTheme + 1) % 3;
            return `theme-${state.uiTheme}`;
        }

        // --- 5. LOGIC ENGINE ---
        function detectIntent(lower){
            if(/joke|funny|laugh/.test(lower)) return "joke";
            if(/miss|sad|lonely/.test(lower)) return "miss";
            if(/love|how much|infinity/.test(lower)) return "love";
            if(/memory|photo|picture|remember/.test(lower)) return "memory";
            if(/music|song|play/.test(lower)) return "music";
            if(/hi|hello|hey/.test(lower)) return "greet";
            if(/random|surprise/.test(lower)) return "random";
            return "default";
        }

        function typingDelay(intent){
            let delay = pickWeighted([
                { v: 650,  w: 1.0 }, { v: 900,  w: 1.2 },
                { v: 1200, w: 1.1 }, { v: 1800, w: 0.5 },
            ]);
            if(intent === "memory" || intent === "love") delay += 600;
            return delay;
        }

        function setTypingMode(mode){
            const el = document.getElementById("typing-dots");
            el.className = "typing-dots"; // reset
            if(mode === "scan") el.classList.add("scan");
            if(mode === "dramatic") el.classList.add("dramatic");
        }

        function generateResponse(input){
            const lower = input.toLowerCase();
            const intent = detectIntent(lower);

            // Update State
            state.streak = (intent === state.lastIntent) ? state.streak + 1 : 0;
            state.lastIntent = intent;

            // Mood Math
            if(intent === "miss" || intent === "love") state.mood = clamp(state.mood + 0.1, -1, 1);
            if(intent === "joke") state.mood = clamp(state.mood + 0.05, -1, 1);
            // Too many generic questions make bot "bored" (mood down)
            if(intent === "default") state.mood = clamp(state.mood - 0.05, -1, 1);

            updateMoodIndicator();
            updateCoreColor(); // Change 3D color

            // Logic Branches
            let responseText = "";
            let media = null;
            let action = null;

            if(intent === "memory"){
                const mem = pick(memories);
                responseText = `Found this in the archive. <strong>${mem.title}</strong>.`;
                media = mem;
                action = "scan";
            } else if (intent === "joke") {
                responseText = pick([
                    "He loves you more than Wi-Fi. That's serious.",
                    "He tried to describe you in one word and my database crashed.",
                    "Knock knock. Who's there? 'Us'. Us who? Us forever. (He made me say that)."
                ]);
                action = "bounce";
            } else if (intent === "miss") {
                responseText = "Checking his biometrics... Heart rate elevated. He misses you like crazy.";
                action = "pulse";
            } else if (intent === "love") {
                responseText = "If love was code, his loop for you would have no 'break' condition.";
                action = "pulse";
            } else if (intent === "greet") {
                responseText = `Hello ${USER_NAME}. Systems operational. Ready to spill the tea?`;
            } else {
                responseText = pick([
                    "I can tell you a joke, show a memory, or check his status.",
                    "Give me a command, Queen.",
                    "He's thinking about you. I can prove it."
                ]);
            }

            return {
                text: wrapFlair(responseText, intent),
                media: media,
                action: action,
                intent: intent
            };
        }

        // --- 6. UI RENDERER ---
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function addMessage(html, sender, isSystem=false){
            const div = document.createElement('div');
            let themeClass = sender === 'ai' ? nextAiTheme() : '';
            if(isSystem) themeClass = 'system';
            
            div.className = `msg ${sender} ${themeClass}`;
            div.innerHTML = html;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping(show){
            const el = document.getElementById('typing-wrapper');
            el.style.display = show ? 'flex' : 'none';
            if(show) scrollToBottom();
        }

        function renderChips(intent){
            const area = document.getElementById('chips-area');
            const sets = {
                greet: ["😜 Joke", "🥺 Miss?", "📸 Memory", "❤️ Love"],
                miss: ["❤️ Reassure me", "😈 Spicy truth", "📸 Memory"],
                love: ["📸 Memory", "😜 Joke", "🎵 Song"],
                default: ["😜 Joke", "🥺 Does he miss me?", "📸 Memory", "❤️ How much?"]
            };
            const labels = sets[intent] || sets.default;
            
            area.innerHTML = labels.map(lbl => {
                const key = lbl.toLowerCase().includes("joke") ? "Tell me a joke" 
                          : lbl.toLowerCase().includes("memory") ? "Show me a memory"
                          : lbl.toLowerCase().includes("miss") ? "Does he miss me?"
                          : lbl.toLowerCase().includes("love") ? "How much does he love me?"
                          : "Random fact";
                return `<div class="chip" onclick="triggerPreset('${key}')">${lbl}</div>`;
            }).join("");
        }

        function triggerPreset(text){
            userInput.value = text;
            handleSend();
        }

        function handleSend(){
            const text = userInput.value.trim();
            if(!text) return;
            
            // User Msg
            addMessage(text, 'user');
            userInput.value = '';

            // AI Flow
            const intent = detectIntent(text);
            
            // 1. Set Typing Look
            setTypingMode(intent === "memory" ? "scan" : (state.mood < -0.3 ? "dramatic" : "normal"));
            showTyping(true);

            // 2. Delay & Respond
            setTimeout(() => {
                const resp = generateResponse(text);
                showTyping(false);
                
                addMessage(resp.text, 'ai');
                
                if(resp.media){
                    const mediaHtml = `
                        <div class="media-card">
                            <img src="${resp.media.img}">
                            <div class="media-caption">${resp.media.text}</div>
                        </div>`;
                    addMessage(mediaHtml, 'ai');
                }

                // Update Chips for next turn
                renderChips(resp.intent);
                
                // 3D Action
                if(resp.action === 'pulse') triggerPulse();
                
            }, typingDelay(intent));
        }

        function updateMoodIndicator(){
            const el = document.getElementById('mood-indicator');
            if(state.mood > 0.3) { el.innerText = "LOVING"; el.style.color = "#0f0"; }
            else if(state.mood < -0.3) { el.innerText = "SASSY"; el.style.color = "var(--accent)"; }
            else { el.innerText = "NEUTRAL"; el.style.color = "#888"; }
        }

        // --- 7. DYNAMIC PLACEHOLDER ---
        const placeholders = [
            "Ask Ngelosi...", "Type “memory” if you miss him...", "Try: “Does he miss me?”",
            "Say: “Tell me something random”", "Confess something. I won’t judge 😌"
        ];
        
        setInterval(() => {
            const now = Date.now();
            if(now - state.lastPlaceholderAt < 5000) return;
            if(userInput.value !== "") return; // Don't overwrite if typing
            state.lastPlaceholderAt = now;
            
            // Fade effect could go here, simply swapping for now
            userInput.placeholder = pick(placeholders);
        }, 4000);

        // --- 8. THREE.JS VISUALS ---
        let scene, camera, renderer, core;

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            // Camera setup to center object
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // The "Brain" / "Soul"
            const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 120, 20);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00f3ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.35
            });
            core = new THREE.Mesh(geometry, material);
            scene.add(core);

            // Floating Particles
            const pGeo = new THREE.BufferGeometry();
            const pCount = 300;
            const pArr = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) {
                pArr[i] = (Math.random() - 0.5) * 15;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.5 });
            const stars = new THREE.Points(pGeo, pMat);
            scene.add(stars);

            function animate() {
                requestAnimationFrame(animate);
                
                // Base rotation + mood influence
                const speed = 0.003 + (state.mood * 0.005); 
                core.rotation.x += speed;
                core.rotation.y += speed * 1.5;
                
                stars.rotation.y -= 0.0005;

                renderer.render(scene, camera);
            }
            animate();
        }

        function updateCoreColor(){
            // Lerp color based on mood
            // High mood = Blue/Green, Low mood (Sassy) = Pink/Red
            const targetColor = state.mood < -0.2 ? 0xff0055 : 0x00f3ff;
            gsap.to(core.material.color, {
                r: new THREE.Color(targetColor).r,
                g: new THREE.Color(targetColor).g,
                b: new THREE.Color(targetColor).b,
                duration: 1
            });
        }

        function triggerPulse(){
            gsap.to(core.scale, { x: 1.3, y: 1.3, z: 1.3, duration: 0.2, yoyo: true, repeat: 1 });
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            init3D();
            renderChips('default');
            setTimeout(() => {
                addMessage(`System initialized.<br>Identity: <strong>${BOT_NAME}</strong>.<br>Archive: Loaded.`, 'ai', true);
            }, 500);
            
            // Clock
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        };

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
