<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Angel AI — For MaMdunge</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root {
  --bg:        #06030a;
  --bg2:       #0d0714;
  --rose:      #c9607a;
  --gold:      #c8a96e;
  --cream:     #f5ede0;
  --muted:     #6b5d72;
  --glass:     rgba(255,245,240,0.04);
  --glass-b:   rgba(255,245,240,0.08);
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--cream);
  font-family: var(--font-serif);
}

/* ── CANVAS ── */
#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── NOISE OVERLAY ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  z-index: 1;
  pointer-events: none;
  opacity: 0.6;
}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  gap: 18px;
  transition: opacity 1.2s ease, transform 1.2s ease;
}
#splash.hidden { opacity: 0; transform: scale(1.04); pointer-events: none; }

.splash-rose {
  width: 90px; height: 90px;
  position: relative;
  animation: roseBreath 3s ease-in-out infinite;
}
.splash-rose svg { width: 100%; height: 100%; }
@keyframes roseBreath {
  0%,100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(201,96,122,0.4)); }
  50% { transform: scale(1.08); filter: drop-shadow(0 0 18px rgba(201,96,122,0.7)); }
}

.splash-title {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--cream);
  text-shadow: 0 0 40px rgba(201,96,122,0.5);
}
.splash-subtitle {
  font-size: 0.85rem;
  font-family: var(--font-mono);
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.splash-btn {
  margin-top: 20px;
  padding: 14px 42px;
  background: transparent;
  border: 1px solid rgba(201,96,122,0.5);
  color: var(--rose);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 40px;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}
.splash-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--rose);
  transform: translateX(-101%);
  transition: transform 0.4s ease;
  z-index: -1;
  border-radius: 40px;
}
.splash-btn:hover { color: #fff; border-color: var(--rose); }
.splash-btn:hover::after { transform: translateX(0); }
.splash-btn:active { transform: scale(0.97); }

/* ── MAIN APP ── */
#app {
  position: relative;
  z-index: 2;
  height: 100dvh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 1.2s ease 0.3s;
}
#app.visible { opacity: 1; }

/* ── HEADER ── */
.header {
  padding: max(50px, env(safe-area-inset-top)) 24px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  background: linear-gradient(to bottom, rgba(6,3,10,0.95) 0%, transparent 100%);
  flex-shrink: 0;
}
.header-left h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  line-height: 1;
}
.header-left h1 span { color: var(--rose); font-style: italic; }
.header-sub {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pulse-dot {
  width: 5px; height: 5px;
  background: var(--rose);
  border-radius: 50%;
  animation: pdot 2.5s ease-in-out infinite;
}
@keyframes pdot { 0%,100%{opacity:1; box-shadow:0 0 4px var(--rose);} 50%{opacity:0.3;box-shadow:none;} }

.header-right {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
}
.header-right .time { color: var(--gold); font-size: 0.85rem; letter-spacing: 0.08em; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid rgba(255,245,240,0.06);
  flex-shrink: 0;
  padding: 0 20px;
  background: rgba(6,3,10,0.5);
}
.tab {
  padding: 10px 18px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.3s;
}
.tab.active { color: var(--cream); border-bottom-color: var(--rose); }
.tab:hover:not(.active) { color: var(--cream); }

/* ── PANELS ── */
.panel { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.panel.active { display: flex; }

/* ── CHAT PANEL ── */
#chat-panel { position: relative; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 10px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,96,122,0.3) transparent;
}

/* Msg bubbles */
.bubble-wrap { display: flex; flex-direction: column; max-width: 82%; gap: 4px; animation: bubbleIn 0.4s cubic-bezier(0.22,1,0.36,1); }
@keyframes bubbleIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
.bubble-wrap.ai { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 13px 18px;
  font-size: 1rem;
  line-height: 1.6;
  position: relative;
  font-weight: 300;
}
.bubble.user {
  background: linear-gradient(135deg, rgba(201,96,122,0.75), rgba(180,70,100,0.65));
  border-radius: 20px 20px 4px 20px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}
.bubble.ai {
  background: var(--glass-b);
  border: 1px solid rgba(255,245,240,0.08);
  border-radius: 4px 20px 20px 20px;
  backdrop-filter: blur(16px);
}
.bubble.ai.accent-gold {
  border-color: rgba(200,169,110,0.25);
  background: rgba(200,169,110,0.05);
}
.bubble.ai.accent-rose {
  border-left: 2px solid var(--rose);
  border-radius: 0 20px 20px 4px;
}
.bubble.system {
  align-self: center;
  max-width: 90%;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(255,245,240,0.03);
  border: 1px dashed rgba(255,245,240,0.1);
  border-radius: 6px;
  padding: 8px 14px;
  text-align: center;
}
.bubble-meta {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--muted);
  padding: 0 4px;
  letter-spacing: 0.08em;
}
.bubble em { color: var(--rose); font-style: italic; }
.bubble strong { color: var(--gold); font-weight: 400; }

/* Typing */
.typing-bubble {
  display: none;
  align-self: flex-start;
  background: var(--glass);
  border: 1px solid rgba(255,245,240,0.07);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 18px;
  gap: 5px;
  align-items: center;
  animation: bubbleIn 0.3s ease;
}
.typing-bubble.show { display: flex; }
.td { width: 5px; height: 5px; border-radius: 50%; background: var(--rose); animation: td 1.5s infinite; }
.td:nth-child(2){animation-delay:0.2s;}
.td:nth-child(3){animation-delay:0.4s;}
@keyframes td { 0%,100%{transform:translateY(0);opacity:0.4;} 50%{transform:translateY(-4px);opacity:1;} }

/* ── MEMORY CARD ── */
.memory-card {
  margin-top: 8px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,245,240,0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: cardReveal 0.6s cubic-bezier(0.22,1,0.36,1);
  max-width: 280px;
}
@keyframes cardReveal { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
.memory-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
.memory-card-body { padding: 12px 14px; background: rgba(13,7,20,0.9); }
.memory-card-title { font-family: var(--font-display); font-size: 0.95rem; color: var(--gold); font-style: italic; }
.memory-card-text { font-size: 0.82rem; color: rgba(245,237,224,0.7); margin-top: 4px; line-height: 1.5; }

/* ── EMOJI REACTION ── */
.reaction-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.reaction-chip {
  font-size: 0.7rem;
  padding: 5px 10px;
  border-radius: 20px;
  background: rgba(255,245,240,0.05);
  border: 1px solid rgba(255,245,240,0.1);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-mono);
  color: var(--muted);
}
.reaction-chip:hover, .reaction-chip:active { background: rgba(201,96,122,0.15); border-color: var(--rose); color: var(--cream); transform: scale(1.05); }

/* ── INPUT AREA ── */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(6,3,10,0.98) 0%, rgba(6,3,10,0.85) 100%);
  border-top: 1px solid rgba(255,245,240,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.quick-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.q-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 30px;
  border: 1px solid rgba(255,245,240,0.1);
  background: rgba(255,245,240,0.04);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: rgba(245,237,224,0.6);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
}
.q-chip:hover, .q-chip:active { border-color: var(--rose); color: var(--cream); background: rgba(201,96,122,0.1); }

.input-row { display: flex; gap: 10px; align-items: center; }
.input-field {
  flex: 1;
  background: rgba(255,245,240,0.04);
  border: 1px solid rgba(255,245,240,0.1);
  border-radius: 28px;
  padding: 13px 20px;
  color: var(--cream);
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 300;
  outline: none;
  transition: all 0.35s;
  -webkit-appearance: none;
}
.input-field::placeholder { color: var(--muted); font-style: italic; }
.input-field:focus { border-color: rgba(201,96,122,0.5); background: rgba(255,245,240,0.06); box-shadow: 0 0 20px rgba(201,96,122,0.1); }

.send-btn {
  width: 48px; height: 48px;
  flex-shrink: 0;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--rose), #a0405a);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(201,96,122,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.send-btn:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(201,96,122,0.2); }

/* ── MEMORIES PANEL ── */
#memories-panel {
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,96,122,0.3) transparent;
  gap: 14px;
}
.mem-grid { columns: 2; gap: 12px; }
.mem-item {
  break-inside: avoid;
  margin-bottom: 12px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,245,240,0.08);
  cursor: pointer;
  position: relative;
  transition: transform 0.3s ease;
}
.mem-item:hover { transform: scale(1.02); }
.mem-item img {
  width: 100%;
  display: block;
  object-fit: cover;
}
.mem-item-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 30px 12px 12px;
  background: linear-gradient(to top, rgba(6,3,10,0.95), transparent);
  font-size: 0.75rem;
  font-family: var(--font-display);
  font-style: italic;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.mem-item:hover .mem-item-overlay { opacity: 1; }

/* ── LIGHTBOX ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(6,3,10,0.95);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 30px;
  animation: fadeIn 0.3s ease;
}
#lightbox.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#lightbox img { max-width: 100%; max-height: 65dvh; border-radius: 12px; object-fit: contain; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
#lightbox-caption { font-family: var(--font-display); font-style: italic; color: var(--gold); font-size: 1.1rem; text-align: center; }
#lightbox-close { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── LOVE NOTE PANEL ── */
#note-panel { overflow-y: auto; padding: 24px 20px; gap: 16px; scrollbar-width: thin; scrollbar-color: rgba(201,96,122,0.3) transparent; }
.note-card {
  background: var(--glass);
  border: 1px solid rgba(200,169,110,0.15);
  border-radius: 16px;
  padding: 22px;
  position: relative;
  overflow: hidden;
}
.note-card::before {
  content: '"';
  position: absolute;
  top: -10px; left: 16px;
  font-size: 6rem;
  color: rgba(200,169,110,0.06);
  font-family: var(--font-display);
  line-height: 1;
}
.note-text {
  font-size: 1.05rem;
  line-height: 1.8;
  font-style: italic;
  font-weight: 300;
  color: rgba(245,237,224,0.85);
  position: relative;
  z-index: 1;
}
.note-author {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 12px;
}
.note-gen-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px dashed rgba(201,96,122,0.35);
  background: transparent;
  color: var(--rose);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
}
.note-gen-btn:hover { background: rgba(201,96,122,0.08); }
.note-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── MUSIC PANEL ── */
#music-panel { overflow-y: auto; padding: 20px; gap: 12px; scrollbar-width: thin; }
.music-hero {
  background: linear-gradient(135deg, rgba(201,96,122,0.12), rgba(200,169,110,0.08));
  border: 1px solid rgba(201,96,122,0.2);
  border-radius: 18px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.vinyl {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle at 50%, #2a1a1a 0%, #111 30%, #1a0a0a 60%, #2a1a1a 100%);
  border: 3px solid rgba(201,96,122,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 0.3s;
}
.vinyl.playing { animation: spin 3s linear infinite; }
.vinyl::after { content:''; width: 12px; height: 12px; border-radius: 50%; background: var(--rose); position: absolute; }
@keyframes spin { to { transform: rotate(360deg); } }
.track-title { font-family: var(--font-display); font-style: italic; font-size: 1.2rem; color: var(--cream); text-align: center; }
.track-artist { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; }
.progress-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; }
.progress-fill { height: 100%; background: linear-gradient(to right, var(--rose), var(--gold)); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
.music-controls { display: flex; gap: 20px; align-items: center; }
.music-btn { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; transition: color 0.2s; padding: 8px; }
.music-btn:hover { color: var(--cream); }
.music-btn.play-pause { width: 48px; height: 48px; border-radius: 50%; background: var(--rose); color: white; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(201,96,122,0.4); transition: transform 0.2s; }
.music-btn.play-pause:active { transform: scale(0.92); }

.track-list { width: 100%; display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.track-item {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid rgba(255,245,240,0.06);
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.25s;
}
.track-item:hover { background: rgba(255,245,240,0.04); border-color: rgba(201,96,122,0.2); }
.track-item.active { background: rgba(201,96,122,0.08); border-color: rgba(201,96,122,0.3); }
.track-num { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); width: 16px; }
.track-info { flex: 1; }
.track-name { font-size: 0.9rem; color: var(--cream); }
.track-art { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); }
.track-dur { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); }

/* ── MUSIC PROGRESS ── */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--rose);
  cursor: pointer;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,96,122,0.3); border-radius: 2px; }

/* ── AI THINKING STATUS ── */
#ai-status {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--rose);
  text-transform: uppercase;
  padding: 0 20px 8px;
  opacity: 0;
  transition: opacity 0.3s;
  flex-shrink: 0;
}
#ai-status.visible { opacity: 1; }
</style>
</head>
<body>

<!-- CANVAS BG -->
<canvas id="canvas"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-rose">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="rg" cx="50%" cy="60%" r="50%">
          <stop offset="0%" stop-color="#c9607a"/>
          <stop offset="100%" stop-color="#6b2040"/>
        </radialGradient>
      </defs>
      <!-- Simple rose petals using circles and ellipses -->

(function initThree() {
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 6;

  // Floating orb geometry
  const geo = new THREE.IcosahedronGeometry(1.8, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xc9607a, wireframe: true, transparent: true, opacity: 0.08 });
  const orb = new THREE.Mesh(geo, mat);
  scene.add(orb);

  // Outer ring
  const rGeo = new THREE.TorusGeometry(3.2, 0.008, 6, 120);
  const rMat = new THREE.MeshBasicMaterial({ color: 0xc8a96e, transparent: true, opacity: 0.12 });
  const ring = new THREE.Mesh(rGeo, rMat);
  ring.rotation.x = 0.8;
  scene.add(ring);

  // Particles
  const pGeo = new THREE.BufferGeometry();
  const count = 500;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 20;
  pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pMat = new THREE.PointsMaterial({ size: 0.03, color: 0xf5ede0, transparent: true, opacity: 0.35 });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.003;
    orb.rotation.x = t * 0.4;
    orb.rotation.y = t * 0.6;
    ring.rotation.z = t * 0.15;
    particles.rotation.y = t * 0.05;
    orb.material.opacity = 0.05 + Math.sin(t) * 0.03;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  window._threeOrb = orb; // expose for mood color changes
})();

function switchTab(name) {

//   CHAT — ANTHROPIC API
// ═══════════════════════════════════════════════
const chatBox = document.getElementById('chat-box');
let bubbleThemeIdx = 0;
const bubbleThemes = ['', 'accent-gold', 'accent-rose'];

function nextTheme() {
  const t = bubbleThemes[bubbleThemeIdx % bubbleThemes.length];
  bubbleThemeIdx++;
  return t;
}

function addSystemMsg(text) {
  const d = document.createElement('div');
  d.className = 'bubble system';
  d.innerHTML = text;
  chatBox.appendChild(d);
  scrollChat();
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  meta.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  chatBox.appendChild(wrap);
  scrollChat();
}

function addAiMsg(text, theme = '') {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ai';
  const bubble = document.createElement('div');
  bubble.className = `bubble ai ${theme || nextTheme()}`;
  // Process *text* → <em>text</em>
  bubble.innerHTML = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  meta.textContent = BOT_NAME + ' · ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  chatBox.appendChild(wrap);
  scrollChat();
  return bubble;
}

function showTyping(show) {
  const el = document.getElementById('typing-ind');
  el.classList.toggle('show', show);
  if(show) scrollChat();
}

function setStatus(msg) {
  const el = document.getElementById('ai-status');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

function scrollChat() {
  setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
}

async function handleSend() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  
  addUserMsg(text);
  
  // Check for memory request
  if (/memory|photo|picture|remember|show me/i.test(text)) {
    showRandomMemory();
  }

  // Check for music request
  if (/music|song|play|vibe/i.test(text)) {
    switchTab('music');
    document.querySelectorAll('.tab')[3].classList.add('active');
  }

  state.convoHistory.push({ role: 'user', content: text });
  
  showTyping(true);
  setStatus('Ngelosi is thinking…');
  
  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: state.convoHistory.slice(-12) // keep context window manageable
      })
    });

    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');

    state.convoHistory.push({ role: 'assistant', content: reply });

    showTyping(false);
    setStatus('');
    addAiMsg(reply);
    updateMood(text);
    renderChips(detectIntent(text));
    
  } catch (err) {
    showTyping(false);
    setStatus('');
    // Fallback to offline responses
    addAiMsg(offlineFallback(text));
  }
  
  btn.disabled = false;
}

function offlineFallback(text) {
  const lower = text.toLowerCase();
  if(/miss/i.test(lower)) return `*He misses you like the sun misses the earth when clouds come.* Every single day, ${HER_NAME}. 🌹`;
  if(/love/i.test(lower)) return `His love for you? *It doesn't have an off switch.* It just keeps running — quietly, deeply, always.`;
  if(/sad|hurt|down/i.test(lower)) return `Come here, love. *You are allowed to feel heavy.* But know this — you are not carrying it alone. Never alone. 💫`;
  if(/joke|funny/i.test(lower)) return `His heart rate literally spikes when you text him. That's not a joke — that's just *facts*, Queen. 😏`;
  return `*I'm with you,* ${HER_NAME}. Whatever you need — say it. I'm all ears. 🌹`;
}

function detectIntent(text) {
  const l = text.toLowerCase();
  if(/miss|sad|lonely/.test(l)) return 'comfort';
  if(/love|heart|forever/.test(l)) return 'love';
  if(/joke|laugh|funny/.test(l)) return 'joke';
  if(/memory|photo|picture/.test(l)) return 'memory';
  if(/music|song|play/.test(l)) return 'music';
  return 'default';
}

function updateMood(text) {
  const l = text.toLowerCase();
  if(/love|miss|heart/.test(l)) state.mood = Math.min(1, state.mood + 0.1);
  if(/angry|upset|mad/.test(l)) state.mood = Math.max(0, state.mood - 0.15);
  
  const states = ['Thoughtful', 'Loving', 'Devoted', 'Warm', 'Glowing'];
  document.getElementById('state-txt').textContent = states[Math.floor(state.mood * (states.length - 1))];
  
  // Shift orb color
  if (window._threeOrb) {
    const c = state.mood > 0.5 ? new THREE.Color(0xc9607a) : new THREE.Color(0xc8a96e);
    window._threeOrb.material.color.lerp(c, 0.3);
  }
}

const chipSets = {

async function generateNote() {
  const btn = document.getElementById('note-btn');
  btn.disabled = true;
  btn.textContent = '✦ Writing with love…';
  
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Write a short, deeply romantic love letter (3-4 sentences) from a South African man to his girlfriend named ${HER_NAME}. It should be poetic, emotionally honest, not generic. Avoid clichés. Write in first person as him. Make it feel real and personal.`
        }]
      })
    });
    const data = await resp.json();
    const note = data.content.map(b => b.text||'').join('');
    
    const card = document.createElement('div');
    card.className = 'note-card';
    card.style.animation = 'bubbleIn 0.5s ease';
    card.innerHTML = `<div class="note-text">${note}</div><div class="note-author">— ${HIS_NAME}, always</div>`;
    document.getElementById('notes-list').prepend(card);
  } catch(e) {
    const fallbacks = [
      `You are the version of home that no building can hold. When I am with you, I am exactly where I'm supposed to be — and I will keep choosing that, over and over, until we are old and our laughter has lines on our faces.`,
      `I keep finding new reasons to love you in the quietest moments — the way you breathe when you sleep, the way you light up talking about things you care about. I want to spend forever noticing.`,
    ];
    const note = fallbacks[Math.floor(Math.random()*fallbacks.length)];
    const card = document.createElement('div');
    card.className = 'note-card';
    card.style.animation = 'bubbleIn 0.5s ease';
    card.innerHTML = `<div class="note-text">${note}</div><div class="note-author">— ${HIS_NAME}, always</div>`;
    document.getElementById('notes-list').prepend(card);
  }
  
  btn.disabled = false;
  btn.textContent = '✦ Generate another love letter';
}

  const list = document.getElementById('track-list');
  list.innerHTML = tracks.map((t, i) => `
    <div class="track-item ${i===0?'active':''}" id="track-${i}" onclick="selectTrack(${i})">
      <div class="track-num">${String(i+1).padStart(2,'0')}</div>
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-art">${t.artist}</div>
      </div>
      <div class="track-dur">${t.duration}</div>
    </div>
  `).join('');
}

function selectTrack(i) {
  document.querySelectorAll('.track-item').forEach(t => t.classList.remove('active'));
  document.getElementById('track-' + i).classList.add('active');
  state.currentTrack = i;
  document.getElementById('now-title').textContent = tracks[i].title;
  document.getElementById('now-artist').textContent = tracks[i].artist;
  audioEl.src = tracks[i].src;
  if (state.playing) audioEl.play().catch(()=>{});
  progEl.value = 0;
}

function togglePlay() {
  if (state.playing) {
    audioEl.pause();
    state.playing = false;
    document.getElementById('pp-icon').className = 'fas fa-play';
    document.getElementById('vinyl').classList.remove('playing');
  } else {
    if (!audioEl.src || audioEl.src === window.location.href) selectTrack(0);
    audioEl.play().catch(() => {
      addAiMsg('*Audio file not found.* Make sure your files are in <em>assets/audio/</em>, love. 🎵');
    });
    state.playing = true;
    document.getElementById('pp-icon').className = 'fas fa-pause';
    document.getElementById('vinyl').classList.add('playing');
  }
}

function prevTrack() { selectTrack((state.currentTrack - 1 + tracks.length) % tracks.length); }
function nextTrack() { selectTrack((state.currentTrack + 1) % tracks.length); }

audioEl.addEventListener('timeupdate', () => {
  if (audioEl.duration) progEl.value = (audioEl.currentTime / audioEl.duration) * 100;
});
audioEl.addEventListener('ended', nextTrack);

function seekAudio(val) {
  if (audioEl.duration) audioEl.currentTime = (val / 100) * audioEl.duration;
}

// ═══════════════════════════════════════════════
//   INIT
// ═══════════════════════════════════════════════
// Auto-start if they're coming back (sessionStorage flag)
if (sessionStorage.getItem('ngelosi_entered')) {
  enterApp();
} else {
  sessionStorage.setItem('ngelosi_entered', '1');
}
</script>
